name: Unit Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'scripts/**'
      - '.github/**'
      - '.vscode/**'
      - '.cursor/**'
      - '.claude/**'
      - 'Makefile'
      - '.env.example'
      - '.gitattributes'
      - 'example_prompts/**'
      - 'example_project/**'
      - 'example_workspace/**'
      - 'staging/**'
      - '*.log'
      - 'LICENSE'
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]

jobs:
  unit-tests:
    if: github.event.pull_request.draft != true
    name: Run Unit Tests
    runs-on: ubuntu-latest
    # 16m37s setup/protected/browser + ~30 minutes broad suite = 46m37s;
    # 50% headroom needs 69m55.5s, rounded up to a finite 70 minutes.
    timeout-minutes: 70

    env:
      PDD_PATH: ${{ github.workspace }}/pdd

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node for real Vitest sandbox coverage
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Provision identity-bound Vitest toolchain
        shell: bash
        run: |
          set -euo pipefail
          toolchain="$RUNNER_TEMP/pdd-vitest-toolchain"
          mkdir -p "$toolchain"
          cp .github/toolchains/vitest/package.json "$toolchain/"
          cp .github/toolchains/vitest/package-lock.json "$toolchain/"
          npm ci --prefix "$toolchain" --ignore-scripts --no-audit --no-fund
          TOOLCHAIN="$toolchain" python - <<'PY'
          import json
          import os
          import re
          import shutil
          import subprocess
          from pathlib import Path

          root = Path(os.environ["TOOLCHAIN"]).resolve()
          launcher = Path(shutil.which("node") or "").resolve(strict=True)
          entrypoint = (root / "node_modules/vitest/vitest.mjs").resolve(strict=True)
          linked = subprocess.run(
              ["ldd", str(launcher)], capture_output=True, text=True, check=True,
          ).stdout
          native = sorted({
              str(Path(match.group(1)).resolve(strict=True))
              for line in linked.splitlines()
              if (match := re.search(r"(?:=>\s+)?(/[^ ]+)", line))
          })
          if not native:
              raise SystemExit("Node native runtime closure is empty")
          manifest = root / "vitest-toolchain.json"
          manifest.write_text(json.dumps({
              "version": 1,
              "roles": {
                  "launcher": str(launcher),
                  "entrypoint": str(entrypoint),
                  "dependencies": str((root / "node_modules").resolve()),
                  "native_runtime": native,
                  "lockfile": str((root / "package-lock.json").resolve(strict=True)),
              },
          }), encoding="utf-8")
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as handle:
              handle.write(f"PDD_REAL_VITEST_TOOLCHAIN_MANIFEST={manifest}\n")
          PY

      - name: Provision identity-bound Playwright Chromium toolchain
        shell: bash
        run: |
          set -euo pipefail
          toolchain="$RUNNER_TEMP/pdd-playwright-toolchain"
          browser_cache="$toolchain/browser-runtime"
          PLAYWRIGHT_BROWSERS_PATH="$browser_cache" npm install --prefix "$toolchain" --ignore-scripts --no-audit --no-fund @playwright/test@1.55.0
          PLAYWRIGHT_BROWSERS_PATH="$browser_cache" "$toolchain/node_modules/.bin/playwright" install --with-deps chromium
          TOOLCHAIN="$toolchain" BROWSER_CACHE="$browser_cache" python - <<'PY'
          import json
          import os
          import re
          import shutil
          import stat
          import subprocess
          from pathlib import Path

          root = Path(os.environ["TOOLCHAIN"]).resolve()
          launcher = Path(shutil.which("node") or "").resolve(strict=True)
          entrypoint = (root / "node_modules/@playwright/test/cli.js").resolve(strict=True)
          browser = Path(os.environ["BROWSER_CACHE"]).resolve(strict=True)
          native = set()
          candidates = [launcher]
          candidates.extend(
              path for path in browser.rglob("*")
              if path.is_file() and stat.S_IMODE(path.stat().st_mode) & 0o111
          )
          for executable in candidates:
              linked = subprocess.run(
                  ["ldd", str(executable)], capture_output=True, text=True,
                  check=False,
              )
              for line in linked.stdout.splitlines():
                  match = re.search(r"(?:=>\s+)?(/[^ ]+)", line)
                  if match and Path(match.group(1)).is_file():
                      native.add(str(Path(match.group(1))))
          if not native:
              raise SystemExit("Playwright native runtime closure is empty")
          manifest = root / "playwright-toolchain.json"
          manifest.write_text(json.dumps({
              "version": 3,
              "roles": {
                  "launcher": str(launcher),
                  "entrypoint": str(entrypoint),
                  "dependencies": str((root / "node_modules").resolve()),
                  "browser_runtime": str(browser),
                  "native_runtime": sorted(native),
                  "lockfile": str((root / "package-lock.json").resolve(strict=True)),
              },
          }), encoding="utf-8")
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as handle:
              handle.write(f"PDD_REAL_PLAYWRIGHT_TOOLCHAIN_MANIFEST={manifest}\n")
          PY

      - name: Configure git identity
        run: |
          git config --global user.email "ci@pdd.dev"
          git config --global user.name "PDD CI"
          git config --global init.defaultBranch main

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-timeout

      - name: Provision and verify protected Linux sandbox
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          command -v bwrap
          command -v systemd-run
          command -v unshare
          command -v nsenter
          sudo -n true
          bwrap --version
          private_root="$(mktemp -d)"
          chmod 700 "$private_root"
          mkdir -m 700 "$private_root/scratch"
          PRIVATE_ROOT="$private_root" python - <<'PY'
          import os
          import json
          import subprocess
          import sys
          from pathlib import Path
          from pdd.sync_core.supervisor import (
              _sandbox_command,
              released_runtime_closure_paths,
              run_supervised,
          )

          root = Path(os.environ["PRIVATE_ROOT"])
          resolved_interpreter = Path(sys.executable).resolve()
          print("resolved interpreter:", resolved_interpreter)
          print(subprocess.run(
              ["ldd", str(resolved_interpreter)], check=False, text=True,
              capture_output=True,
          ).stdout)
          sandbox, plan = _sandbox_command(
              [sys.executable, "-c", "import math"], (root / "scratch",)
          )
          print("sandbox command:", sandbox[:4])
          print("sandbox destinations:", plan.bwrap_argv)
          print("runtime native paths:", [
              str(path) for label, path in released_runtime_closure_paths()
              if label.startswith("native/")
          ])
          script = """from pathlib import Path
          import math
          Path('ok').write_text('ok')
          try:
              Path('../outside').write_text('forbidden')
          except OSError:
              pass
          else:
              raise SystemExit('write escaped private scratch root')
          """
          result, surviving = run_supervised(
              [sys.executable, "-c", script],
              cwd=root / "scratch", timeout=10, env=dict(os.environ),
              writable_roots=(root / "scratch",),
          )
          assert result.returncode == 0, result.stderr
          assert not surviving
          assert not (root / "scratch" / "ok").exists()
          assert not (root / "outside").exists()
          PY

      - name: Verify protected cgroup-v2 containment smoke
        run: |
          set -euo pipefail
          root="$(mktemp -d)"
          mkdir -m 700 "$root/scratch"
          ROOT="$root" python - <<'PY'
          import os
          import sys
          from pathlib import Path
          from pdd.sync_core.supervisor import SupervisorLimits, run_supervised

          root = Path(os.environ["ROOT"])
          def assert_no_leak():
              units = subprocess.run(
                  ['sudo', '-n', 'systemctl', 'list-units',
                   'pdd-validator-*.scope', '--all', '--no-legend'],
                  check=True, capture_output=True, text=True,
              ).stdout.strip()
              assert not units, units
              groups = subprocess.run(
                  ['sudo', '-n', 'find', '/sys/fs/cgroup', '-type', 'd',
                   '-name', 'pdd-validator-*', '-print'],
                  check=True, capture_output=True, text=True,
              ).stdout.strip()
              assert not groups, groups

          import subprocess
          assert_no_leak()
          program = '''import os
          from pathlib import Path
          group = Path('/sys/fs/cgroup')
          expected = {
              'memory.max': str(2 * 1024 * 1024 * 1024),
              'memory.swap.max': '0',
              'memory.oom.group': '1',
              'pids.max': '8',
          }
          for name, value in expected.items():
              actual = (group / name).read_text(encoding='ascii').strip()
              assert actual == value, (name, actual)
          assert not [path for path in group.iterdir() if path.is_dir()]
          try:
              (group / 'cgroup.procs').write_text(str(os.getpid()), encoding='ascii')
          except OSError:
              pass
          else:
              raise SystemExit('candidate can migrate cgroups')
          '''
          result, surviving = run_supervised(
              [sys.executable, '-c', program], cwd=root / 'scratch', timeout=30,
              env=dict(os.environ), writable_roots=(root / 'scratch',),
              limits=SupervisorLimits(max_processes=8),
          )
          assert result.returncode == 0, result.stderr
          assert not surviving
          assert_no_leak()
          oom, surviving = run_supervised(
              [sys.executable, '-c', 'bytearray(512 * 1024 * 1024)'],
              cwd=root / 'scratch', timeout=30, env=dict(os.environ),
              writable_roots=(root / 'scratch',), limits=SupervisorLimits(
                  max_memory_bytes=128 * 1024 * 1024,
                  max_virtual_memory_bytes=2 * 1024 * 1024 * 1024,
              ),
          )
          assert oom.returncode not in (0, 125), oom.stderr
          assert 'scope produced no protected candidate record' not in oom.stderr
          assert 'cgroup memory.events oom delta=' in oom.stderr, oom.stderr
          assert not surviving
          assert_no_leak()
          tasks, surviving = run_supervised(
              [sys.executable, '-c', "import subprocess,sys; children=[subprocess.Popen([sys.executable, '-c', 'import time; time.sleep(2)']) for _ in range(16)]; [child.wait() for child in children]"],
              cwd=root / 'scratch', timeout=30, env=dict(os.environ),
              writable_roots=(root / 'scratch',), limits=SupervisorLimits(max_processes=8),
          )
          assert tasks.returncode != 0, tasks.stderr
          assert tasks.returncode != 125, tasks.stderr
          assert 'scope produced no protected candidate record' not in tasks.stderr
          assert 'cgroup pids.events max delta=' in tasks.stderr, tasks.stderr
          assert not surviving
          assert_no_leak()
          timed_out, surviving = run_supervised(
              [sys.executable, '-c', 'import time; time.sleep(30)'],
              cwd=root / 'scratch', timeout=1, env=dict(os.environ),
              writable_roots=(root / 'scratch',), limits=SupervisorLimits(),
          )
          assert timed_out.returncode == 124, timed_out.stderr
          assert 'scope produced no protected candidate record' not in timed_out.stderr
          assert not surviving
          assert_no_leak()
          output, surviving = run_supervised(
              [sys.executable, '-c', "print('x' * 200000)"],
              cwd=root / 'scratch', timeout=30, env=dict(os.environ),
              writable_roots=(root / 'scratch',),
              limits=SupervisorLimits(max_output_bytes=1024),
          )
          assert output.returncode == 125, output.stderr
          assert not surviving
          assert_no_leak()
          quota = SupervisorLimits(max_writable_bytes=1024 * 1024)
          def quota_case(name):
              path = root / 'scratch' / name
              path.mkdir()
              return path
          sparse_root = quota_case('quota-sparse')
          sparse, surviving = run_supervised(
              [sys.executable, '-c', "open('sparse','wb').truncate(8*1024*1024)"],
              cwd=sparse_root, timeout=30, env=dict(os.environ),
              writable_roots=(sparse_root,), limits=quota,
          )
          assert sparse.returncode != 0, sparse.stderr
          assert not surviving
          assert_no_leak()
          aggregate_root = quota_case('quota-aggregate')
          aggregate, surviving = run_supervised(
              [sys.executable, '-c', "[open(f'part-{i}','wb').write(b'x'*131072) for i in range(32)]"],
              cwd=aggregate_root, timeout=30, env=dict(os.environ),
              writable_roots=(aggregate_root,), limits=quota,
          )
          assert aggregate.returncode != 0, aggregate.stderr
          assert not surviving
          assert_no_leak()
          churn_root = quota_case('quota-churn')
          churn, surviving = run_supervised(
              [sys.executable, '-c', "from pathlib import Path; files=[Path(f'churn-{i}') for i in range(16)]; [path.write_bytes(b'x'*131072) for path in files]; [path.unlink() for path in files]"],
              cwd=churn_root, timeout=30, env=dict(os.environ),
              writable_roots=(churn_root,), limits=quota,
          )
          assert churn.returncode != 0, churn.stderr
          assert not surviving
          assert_no_leak()
          within_root = quota_case('quota-within')
          within, surviving = run_supervised(
              [sys.executable, '-c', "open('within','wb').write(b'x'*65536)"],
              cwd=within_root, timeout=30, env=dict(os.environ),
              writable_roots=(within_root,), limits=quota,
          )
          assert within.returncode == 0, within.stderr
          assert not surviving
          assert_no_leak()
          PY

      - name: Verify protected pytest smoke
        run: >
          pytest -q
          tests/test_sync_core_runner.py::test_passing_collected_test_is_pass
          --timeout=60

      - name: Verify protected signer containment smoke
        run: >
          pytest -q
          tests/test_sync_core_trust.py::test_remote_signer_timeout_reaps_env_cleared_detached_descendant
          --timeout=60

      - name: Run focused protected-runner tests
        run: >
          pytest -q
          tests/test_sync_core_supervisor.py
          tests/test_sync_core_runner.py
          tests/test_sync_core_trust.py
          tests/test_sync_core_lifecycle_scenarios.py
          tests/test_sync_core_reporting.py
          tests/test_sync_core_runner_playwright.py
          --timeout=60

      - name: Verify protected Playwright toolchain is complete
        run: |
          set -euo pipefail
          test -n "${PDD_REAL_PLAYWRIGHT_TOOLCHAIN_MANIFEST:-}"
          test -f "$PDD_REAL_PLAYWRIGHT_TOOLCHAIN_MANIFEST"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          manifest = Path(os.environ["PDD_REAL_PLAYWRIGHT_TOOLCHAIN_MANIFEST"])
          roles = json.loads(manifest.read_text())["roles"]
          required = {
              "launcher", "entrypoint", "dependencies", "browser_runtime",
              "native_runtime", "lockfile",
          }
          assert set(roles) == required
          assert roles["native_runtime"]
          scalar = required - {"native_runtime"}
          assert all(Path(roles[name]).exists() for name in scalar)
          assert all(Path(value).is_file() for value in roles["native_runtime"])
          PY

      - name: Run real protected Playwright and authenticated supervisor protocols
        env:
          PDD_RUN_REAL_PLAYWRIGHT: '1'
        run: |
          pytest -q \
            tests/test_sync_core_runner_playwright.py::test_real_playwright_1_55_config_suffixes_collect_and_use_config_dir \
            tests/test_sync_core_supervisor.py::test_real_linux_authenticated_termination_and_cleanup \
            tests/test_sync_core_supervisor.py::test_real_linux_adapter_environment_handoff[pytest] \
            tests/test_sync_core_supervisor.py::test_real_linux_adapter_environment_handoff[vitest] \
            tests/test_sync_core_supervisor.py::test_real_linux_adapter_environment_handoff[playwright] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[normal-hierarchy-environment] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[parent-exit-before-start] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[parent-exit-during-execution] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[parent-exit-after-result] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[stalled-result-reader] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[missing-ack] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[duplicate-ack] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[trailing-frame] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[trailing-raw] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[reordered-extra] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[stalled-observation-reader] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[initial-scan-failure] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[initial-watched-assertion-failure] \
            tests/test_sync_core_supervisor.py::test_real_linux_playwright_descriptor_exact_chain[fd-only-namespace-holder-cleanup] \
            tests/test_sync_core_supervisor.py::test_simultaneous_high_volume_stdio_has_one_aggregate_bound \
            --timeout=90

      - name: Validate architecture vs prompt includes (fixture smoke)
        run: pdd checkup --validate-arch-includes --project-root tests/fixtures/arch_include_validate_ok

      - name: Validate architecture vs prompt includes (repo, non-sample trees)
        run: pdd checkup --validate-arch-includes

      - name: Run unit tests
        run: >
          pytest tests/
          -m "not integration and not e2e and not real and not private_prompt"
          -v --tb=short --timeout=60 -n auto
          --ignore=tests/commands/test_connect.py
          --ignore=tests/test_bug_to_unit_test.py
          --ignore=tests/test_context_generator.py
          --ignore=tests/test_crash_main.py
          --ignore=tests/test_generate_test.py
          --ignore=tests/test_fix_error_loop.py
          --ignore=tests/test_llm_invoke.py
          --deselect=tests/test_setup_tool.py::test_create_api_env_script_with_special_characters_zsh
          --deselect=tests/test_setup_tool.py::test_create_api_env_script_with_common_problematic_characters

  public-cli-regression:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Public CLI Regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PDD_PATH: ${{ github.workspace }}/pdd

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@pdd.dev"
          git config --global user.name "PDD CI"
          git config --global init.defaultBranch main

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run public-safe CLI regressions
        run: make regression-public

  story-regression:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Story Regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PDD_PATH: ${{ github.workspace }}/pdd

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@pdd.dev"
          git config --global user.name "PDD CI"
          git config --global init.defaultBranch main

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run public-safe story regression lane
        run: make regression-stories

  package-preprocess-smoke:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Package Preprocess Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PDD_PATH: ''
      PYTHONPATH: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node for real Playwright wheel coverage
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Provision identity-bound Playwright Chromium toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          command -v bwrap
          bwrap --version
          toolchain="$RUNNER_TEMP/pdd-playwright-toolchain"
          browser_cache="$toolchain/browser-runtime"
          PLAYWRIGHT_BROWSERS_PATH="$browser_cache" npm install --prefix "$toolchain" --ignore-scripts --no-audit --no-fund @playwright/test@1.55.0
          PLAYWRIGHT_BROWSERS_PATH="$browser_cache" "$toolchain/node_modules/.bin/playwright" install --with-deps chromium
          TOOLCHAIN="$toolchain" BROWSER_CACHE="$browser_cache" python - <<'PY'
          import json
          import os
          import re
          import shutil
          import stat
          import subprocess
          from pathlib import Path

          root = Path(os.environ["TOOLCHAIN"]).resolve()
          launcher = Path(shutil.which("node") or "").resolve(strict=True)
          entrypoint = (root / "node_modules/@playwright/test/cli.js").resolve(strict=True)
          browser = Path(os.environ["BROWSER_CACHE"]).resolve(strict=True)
          native = set()
          candidates = [launcher]
          candidates.extend(
              path for path in browser.rglob("*")
              if path.is_file() and stat.S_IMODE(path.stat().st_mode) & 0o111
          )
          for executable in candidates:
              linked = subprocess.run(
                  ["ldd", str(executable)], capture_output=True, text=True,
                  check=False,
              )
              for line in linked.stdout.splitlines():
                  match = re.search(r"(?:=>\s+)?(/[^ ]+)", line)
                  if match and Path(match.group(1)).is_file():
                      native.add(str(Path(match.group(1))))
          if not native:
              raise SystemExit("Playwright native runtime closure is empty")
          manifest = root / "playwright-toolchain.json"
          manifest.write_text(json.dumps({
              "version": 3,
              "roles": {
                  "launcher": str(launcher),
                  "entrypoint": str(entrypoint),
                  "dependencies": str((root / "node_modules").resolve()),
                  "browser_runtime": str(browser),
                  "native_runtime": sorted(native),
                  "lockfile": str((root / "package-lock.json").resolve(strict=True)),
              },
          }), encoding="utf-8")
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as handle:
              handle.write(f"PDD_REAL_PLAYWRIGHT_TOOLCHAIN_MANIFEST={manifest}\n")
          PY

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --wheel --outdir dist-smoke

      - name: Materialize offline wheelhouse
        run: |
          mkdir -p "$RUNNER_TEMP/pdd-wheelhouse"
          python -m pip download \
            --dest "$RUNNER_TEMP/pdd-wheelhouse" \
            dist-smoke/*.whl pytest pytest-timeout

      - name: Install wheel in isolated no-network environment
        run: |
          python -m venv "$RUNNER_TEMP/pdd-wheel-smoke"
          PIP_NO_INDEX=1 "$RUNNER_TEMP/pdd-wheel-smoke/bin/python" -m pip install \
            --find-links "$RUNNER_TEMP/pdd-wheelhouse" \
            pdd-cli pytest pytest-timeout

      - name: Run real protected Playwright installed-wheel protocol
        env:
          PDD_RUN_REAL_PLAYWRIGHT: '1'
          PDD_REQUIRE_INSTALLED_WHEEL: '1'
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          cp tests/test_sync_core_runner_playwright.py "$smoke_dir/"
          cd "$smoke_dir"
          "$RUNNER_TEMP/pdd-wheel-smoke/bin/pytest" -q \
            test_sync_core_runner_playwright.py::test_real_playwright_1_55_config_suffixes_collect_and_use_config_dir \
            --timeout=90

      - name: Verify packaged Vitest grammars offline
        run: |
          cd "$(mktemp -d)"
          "$RUNNER_TEMP/pdd-wheel-smoke/bin/python" - <<'PY'
          import importlib.metadata
          import socket
          from pathlib import Path

          class DeniedSocket(socket.socket):
              def connect(self, _address):
                  raise AssertionError("Vitest grammar initialization attempted network access")

              def connect_ex(self, _address):
                  raise AssertionError("Vitest grammar initialization attempted network access")

          socket.socket = DeniedSocket
          import pdd
          from pdd.sync_core.runner import VITEST_GRAMMAR_VERSIONS, _vitest_parser

          if "site-packages" not in str(Path(pdd.__file__).resolve()):
              raise SystemExit(f"pdd imported outside isolated wheel: {pdd.__file__}")
          for distribution, expected in VITEST_GRAMMAR_VERSIONS.items():
              actual = importlib.metadata.version(distribution)
              if actual != expected:
                  raise SystemExit(f"{distribution}: expected {expected}, found {actual}")
          javascript = _vitest_parser("javascript")
          typescript = _vitest_parser("typescript")
          assert not javascript.parse(b"const value = 1;").root_node.has_error
          assert not typescript.parse(b"const value: number = 1;").root_node.has_error
          PY

      - name: Verify packaged preprocess include resolution
        run: |
          set -euo pipefail
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          "$RUNNER_TEMP/pdd-wheel-smoke/bin/python" - <<'PY'
          import pdd

          if "site-packages" not in pdd.__file__:
              raise SystemExit(f"pdd imported from checkout instead of installed wheel: {pdd.__file__}")
          PY
          printf '<include>docs/prompting_guide.md</include>\n' > test_include_python.prompt
          "$RUNNER_TEMP/pdd-wheel-smoke/bin/pdd" --quiet preprocess test_include_python.prompt --output preprocessed.txt
          grep -q "PDD Mental Model" preprocessed.txt

  repo-bloat-docker-e2e:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Repo Bloat Docker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: research/repo-bloat-benchmark/harness/runner/container

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Build hard-tier containers
        run: docker compose build

      - name: Start isolated agent
        run: docker compose up -d agent

      - name: Verify runner egress lockdown
        run: docker compose run --rm --use-aliases runner python3 harness/runner/container/egress_check.py --role runner

      - name: Verify isolated-agent integration path
        run: docker compose run --rm --use-aliases runner python3 -m harness.runner.container.integration_check

      - name: Stop hard-tier containers
        if: always()
        run: docker compose down -v
