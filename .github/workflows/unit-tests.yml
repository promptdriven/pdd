name: Unit Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'scripts/**'
      - '.github/**'
      - '.vscode/**'
      - '.cursor/**'
      - '.claude/**'
      - 'Makefile'
      - '.env.example'
      - '.gitattributes'
      - 'example_prompts/**'
      - 'example_project/**'
      - 'example_workspace/**'
      - 'staging/**'
      - '*.log'
      - 'LICENSE'
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]

jobs:
  unit-tests:
    if: github.event.pull_request.draft != true
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PDD_PATH: ${{ github.workspace }}/pdd

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@pdd.dev"
          git config --global user.name "PDD CI"
          git config --global init.defaultBranch main

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-timeout

      - name: Provision and verify protected Linux sandbox
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          private_root="$(mktemp -d)"
          chmod 700 "$private_root"
          mkdir -m 700 "$private_root/scratch"
          PRIVATE_ROOT="$private_root" python - <<'PY'
          import os
          import sys
          from pathlib import Path
          from pdd.sync_core.supervisor import run_supervised

          root = Path(os.environ["PRIVATE_ROOT"])
          script = """from pathlib import Path
          Path('ok').write_text('ok')
          try:
              Path('../outside').write_text('forbidden')
          except OSError:
              pass
          else:
              raise SystemExit('write escaped private scratch root')
          """
          result, surviving = run_supervised(
              [sys.executable, "-c", script],
              cwd=root / "scratch", timeout=10, env=dict(os.environ),
              writable_roots=(root / "scratch",),
          )
          assert result.returncode == 0, result.stderr
          assert not surviving
          assert (root / "scratch" / "ok").read_text() == "ok"
          assert not (root / "outside").exists()
          PY

      - name: Validate architecture vs prompt includes (fixture smoke)
        run: pdd checkup --validate-arch-includes --project-root tests/fixtures/arch_include_validate_ok

      - name: Validate architecture vs prompt includes (repo, non-sample trees)
        run: pdd checkup --validate-arch-includes

      - name: Run unit tests
        run: >
          pytest tests/
          -m "not integration and not e2e and not real and not private_prompt"
          -v --tb=short --timeout=60 -n auto
          --ignore=tests/commands/test_connect.py
          --ignore=tests/test_bug_to_unit_test.py
          --ignore=tests/test_context_generator.py
          --ignore=tests/test_crash_main.py
          --ignore=tests/test_generate_test.py
          --ignore=tests/test_fix_error_loop.py
          --ignore=tests/test_llm_invoke.py
          --deselect=tests/test_setup_tool.py::test_create_api_env_script_with_special_characters_zsh
          --deselect=tests/test_setup_tool.py::test_create_api_env_script_with_common_problematic_characters

  public-cli-regression:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Public CLI Regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PDD_PATH: ${{ github.workspace }}/pdd

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@pdd.dev"
          git config --global user.name "PDD CI"
          git config --global init.defaultBranch main

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run public-safe CLI regressions
        run: make regression-public

  story-regression:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Story Regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PDD_PATH: ${{ github.workspace }}/pdd

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@pdd.dev"
          git config --global user.name "PDD CI"
          git config --global init.defaultBranch main

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run public-safe story regression lane
        run: make regression-stories

  package-preprocess-smoke:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Package Preprocess Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PDD_PATH: ''
      PYTHONPATH: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --wheel --outdir dist-smoke

      - name: Install wheel in isolated environment
        run: |
          python -m venv "$RUNNER_TEMP/pdd-wheel-smoke"
          "$RUNNER_TEMP/pdd-wheel-smoke/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/pdd-wheel-smoke/bin/python" -m pip install dist-smoke/*.whl

      - name: Verify packaged preprocess include resolution
        run: |
          set -euo pipefail
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          "$RUNNER_TEMP/pdd-wheel-smoke/bin/python" - <<'PY'
          import pdd

          if "site-packages" not in pdd.__file__:
              raise SystemExit(f"pdd imported from checkout instead of installed wheel: {pdd.__file__}")
          PY
          printf '<include>docs/prompting_guide.md</include>\n' > test_include_python.prompt
          "$RUNNER_TEMP/pdd-wheel-smoke/bin/pdd" --quiet preprocess test_include_python.prompt --output preprocessed.txt
          grep -q "PDD Mental Model" preprocessed.txt

  repo-bloat-docker-e2e:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Repo Bloat Docker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: research/repo-bloat-benchmark/harness/runner/container

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Build hard-tier containers
        run: docker compose build

      - name: Start isolated agent
        run: docker compose up -d agent

      - name: Verify runner egress lockdown
        run: docker compose run --rm --use-aliases runner python3 harness/runner/container/egress_check.py --role runner

      - name: Verify isolated-agent integration path
        run: docker compose run --rm --use-aliases runner python3 -m harness.runner.container.integration_check

      - name: Stop hard-tier containers
        if: always()
        run: docker compose down -v
