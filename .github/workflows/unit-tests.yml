name: Unit Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'scripts/**'
      - '.github/**'
      - '.vscode/**'
      - '.cursor/**'
      - '.claude/**'
      - 'Makefile'
      - '.env.example'
      - '.gitattributes'
      - 'example_prompts/**'
      - 'example_project/**'
      - 'example_workspace/**'
      - 'staging/**'
      - '*.log'
      - 'LICENSE'
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]

jobs:
  unit-tests:
    if: github.event.pull_request.draft != true
    name: Run Unit Tests
    runs-on: ubuntu-latest
    # The broad protected suite reached 93% without an assertion failure at the
    # former 45-minute limit; retain bounded headroom for variable runner load.
    timeout-minutes: 60

    env:
      PDD_PATH: ${{ github.workspace }}/pdd

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node for real Vitest sandbox coverage
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Provision identity-bound Vitest toolchain
        shell: bash
        run: |
          set -euo pipefail
          toolchain="$RUNNER_TEMP/pdd-vitest-toolchain"
          mkdir -p "$toolchain"
          cp .github/toolchains/vitest/package.json "$toolchain/"
          cp .github/toolchains/vitest/package-lock.json "$toolchain/"
          npm ci --prefix "$toolchain" --ignore-scripts --no-audit --no-fund
          TOOLCHAIN="$toolchain" python - <<'PY'
          import json
          import os
          import re
          import shutil
          import subprocess
          from pathlib import Path

          root = Path(os.environ["TOOLCHAIN"]).resolve()
          launcher = Path(shutil.which("node") or "").resolve(strict=True)
          entrypoint = (root / "node_modules/vitest/vitest.mjs").resolve(strict=True)
          headers = launcher.parents[1] / "include/node"
          if any(
              path.is_symlink() or not path.is_file()
              for path in (
                  headers / "node_api.h", headers / "node_api_types.h",
                  headers / "js_native_api.h", headers / "js_native_api_types.h",
              )
          ):
              raise SystemExit("selected Node 22 distribution lacks regular N-API headers")
          linked = subprocess.run(
              ["ldd", str(launcher)], capture_output=True, text=True, check=True,
          ).stdout
          native = sorted({
              str(Path(match.group(1)).resolve(strict=True))
              for line in linked.splitlines()
              if (match := re.search(r"(?:=>\s+)?(/[^ ]+)", line))
          })
          if not native:
              raise SystemExit("Node native runtime closure is empty")
          manifest = root / "vitest-toolchain.json"
          manifest.write_text(json.dumps({
              "version": 1,
              "roles": {
                  "launcher": str(launcher),
                  "entrypoint": str(entrypoint),
                  "dependencies": str((root / "node_modules").resolve()),
                  "native_runtime": native,
                  "lockfile": str((root / "package-lock.json").resolve(strict=True)),
                  "headers": str(headers.absolute()),
              },
          }), encoding="utf-8")
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as handle:
              handle.write(f"PDD_REAL_VITEST_TOOLCHAIN_MANIFEST={manifest}\n")
          PY

      - name: Configure git identity
        run: |
          git config --global user.email "ci@pdd.dev"
          git config --global user.name "PDD CI"
          git config --global init.defaultBranch main

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-timeout

      - name: Verify protected global-sync evidence-ledger drift
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          python -m pdd.sync_core.global_sync_ledger
          --plan docs/global_sync_resolution_plan.md
          --output docs/global_sync_evidence_ledger.yaml
          --check --verify-remote

      - name: Verify global-sync execution-contract semantics
        run: >
          python scripts/verify_global_sync_execution_contract.py
          --plan docs/global_sync_resolution_plan.md
          --state docs/global_sync_execution_state.yaml

      - name: Prove global-sync M0 contract against the exact built candidate wheel
        shell: bash
        run: |
          set -euo pipefail
          candidate_sha="$(git rev-parse HEAD)"
          wheel_dir="$RUNNER_TEMP/pdd-contract-wheel"
          wheel_venv="$RUNNER_TEMP/pdd-contract-wheel-venv"
          mkdir -p "$wheel_dir"
          python -m pip install build
          python -m build --wheel --outdir "$wheel_dir"
          wheel="$(find "$wheel_dir" -maxdepth 1 -type f -name '*.whl' -print -quit)"
          test -n "$wheel"
          python -m venv "$wheel_venv"
          "$wheel_venv/bin/python" -m pip install "$wheel"
          expected_base=()
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            expected_base=(--expected-protected-base "${{ github.event.pull_request.base.sha }}")
          fi
          "$wheel_venv/bin/python" scripts/verify_global_sync_execution_contract.py \
            --plan docs/global_sync_resolution_plan.md \
            --state docs/global_sync_execution_state.yaml \
            --root "$GITHUB_WORKSPACE" \
            --wheel-python "$wheel_venv/bin/python" \
            --wheel-artifact "$wheel" \
            --candidate-sha "$candidate_sha" \
            "${expected_base[@]}" \
            --output "$RUNNER_TEMP/global-sync-m0-wheel-proof.json"

      - name: Provision and verify protected Linux sandbox
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          private_root="$(mktemp -d)"
          chmod 700 "$private_root"
          mkdir -m 700 "$private_root/scratch"
          PRIVATE_ROOT="$private_root" python - <<'PY'
          import os
          import json
          import subprocess
          import sys
          from pathlib import Path
          from pdd.sync_core.supervisor import (
              _sandbox_command,
              released_runtime_closure_paths,
              run_supervised,
          )

          root = Path(os.environ["PRIVATE_ROOT"])
          resolved_interpreter = Path(sys.executable).resolve()
          print("resolved interpreter:", resolved_interpreter)
          print(subprocess.run(
              ["ldd", str(resolved_interpreter)], check=False, text=True,
              capture_output=True,
          ).stdout)
          sandbox, _ = _sandbox_command(
              [sys.executable, "-c", "import math"], (root / "scratch",)
          )
          print("sandbox destinations:", json.loads(sandbox[-2]))
          print("runtime native paths:", [
              str(path) for label, path in released_runtime_closure_paths()
              if label.startswith("native/")
          ])
          script = """from pathlib import Path
          import math
          Path('ok').write_text('ok')
          try:
              Path('../outside').write_text('forbidden')
          except OSError:
              pass
          else:
              raise SystemExit('write escaped private scratch root')
          """
          result, surviving = run_supervised(
              [sys.executable, "-c", script],
              cwd=root / "scratch", timeout=10, env=dict(os.environ),
              writable_roots=(root / "scratch",),
          )
          assert result.returncode == 0, result.stderr
          assert not surviving
          assert (root / "scratch" / "ok").read_text() == "ok"
          assert not (root / "outside").exists()
          PY

      - name: Verify protected pytest smoke
        run: >
          pytest -q
          tests/test_sync_core_runner.py::test_passing_collected_test_is_pass
          --timeout=60

      - name: Verify protected signer containment smoke
        run: >
          pytest -q
          tests/test_sync_core_trust.py::test_remote_signer_timeout_reaps_env_cleared_detached_descendant
          --timeout=60

      # This probe starts a real Node/Vitest subprocess inside the protected
      # Linux namespace. Keep it in a fresh pytest interpreter so the
      # security-critical child startup is independently required, rather
      # than coupled to xdist worker process state.
      - name: Verify real Vitest sandbox isolation
        run: >
          pytest -q
          tests/test_sync_core_runner_vitest.py::test_real_vitest_runs_copied_entrypoint_without_candidate_result_access
          --timeout=60

      - name: Run focused protected-runner tests
        run: >
          pytest -q
          tests/test_sync_core_supervisor.py
          tests/test_sync_core_runner.py
          tests/test_sync_core_trust.py
          tests/test_sync_core_lifecycle_scenarios.py
          tests/test_sync_core_reporting.py
          --timeout=60

      - name: Validate architecture vs prompt includes (fixture smoke)
        run: pdd checkup --validate-arch-includes --project-root tests/fixtures/arch_include_validate_ok

      - name: Validate architecture vs prompt includes (repo, non-sample trees)
        run: pdd checkup --validate-arch-includes

      - name: Run unit tests
        run: >
          pytest tests/
          -m "not integration and not e2e and not real and not private_prompt"
          -v --tb=short --timeout=60 -n auto
          --ignore=tests/commands/test_connect.py
          --ignore=tests/test_bug_to_unit_test.py
          --ignore=tests/test_context_generator.py
          --ignore=tests/test_crash_main.py
          --ignore=tests/test_generate_test.py
          --ignore=tests/test_fix_error_loop.py
          --ignore=tests/test_llm_invoke.py
          --deselect=tests/test_sync_core_runner_vitest.py::test_real_vitest_runs_copied_entrypoint_without_candidate_result_access
          --deselect=tests/test_setup_tool.py::test_create_api_env_script_with_special_characters_zsh
          --deselect=tests/test_setup_tool.py::test_create_api_env_script_with_common_problematic_characters

  public-cli-regression:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Public CLI Regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PDD_PATH: ${{ github.workspace }}/pdd

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@pdd.dev"
          git config --global user.name "PDD CI"
          git config --global init.defaultBranch main

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run public-safe CLI regressions
        run: make regression-public

  story-regression:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Story Regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PDD_PATH: ${{ github.workspace }}/pdd

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@pdd.dev"
          git config --global user.name "PDD CI"
          git config --global init.defaultBranch main

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run public-safe story regression lane
        run: make regression-stories

  package-preprocess-smoke:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Package Preprocess Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PDD_PATH: ''
      PYTHONPATH: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node for packaged Vitest authority addon
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --wheel --outdir dist-smoke

      - name: Assert universal wheel contains only Vitest authority source
        run: |
          DIST=dist-smoke python - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          wheels = tuple(Path(os.environ["DIST"]).glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected one wheel, found {wheels}")
          with zipfile.ZipFile(wheels[0]) as archive:
              names = archive.namelist()
          if "pdd/sync_core/native/vitest_fd_cloexec.c" not in names:
              raise SystemExit("wheel omits Vitest coordinator C source")
          native = [name for name in names if name.endswith(".node")]
          if native:
              raise SystemExit(f"universal wheel must not contain native binaries: {native}")
          PY

      - name: Materialize offline wheelhouse
        run: |
          mkdir -p "$RUNNER_TEMP/pdd-wheelhouse"
          python -m pip download \
            --dest "$RUNNER_TEMP/pdd-wheelhouse" \
            dist-smoke/*.whl

      - name: Install wheel in isolated no-network environment
        run: |
          python -m venv "$RUNNER_TEMP/pdd-wheel-smoke"
          PIP_NO_INDEX=1 "$RUNNER_TEMP/pdd-wheel-smoke/bin/python" -m pip install \
            --find-links "$RUNNER_TEMP/pdd-wheelhouse" \
            pdd-cli

      - name: Verify installed-wheel Vitest coordinator lifecycle
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          toolchain="$RUNNER_TEMP/pdd-wheel-vitest-toolchain"
          mkdir -p "$toolchain"
          cp .github/toolchains/vitest/package.json "$toolchain/"
          cp .github/toolchains/vitest/package-lock.json "$toolchain/"
          npm ci --prefix "$toolchain" --ignore-scripts --no-audit --no-fund
          TOOLCHAIN="$toolchain" MANIFEST="$RUNNER_TEMP/pdd-wheel-vitest-toolchain.json" python - <<'PY'
          import json
          import os
          import re
          import shutil
          import subprocess
          from pathlib import Path

          root = Path(os.environ["TOOLCHAIN"]).resolve()
          launcher = Path(shutil.which("node") or "").resolve(strict=True)
          entrypoint = (root / "node_modules/vitest/vitest.mjs").resolve(strict=True)
          headers = launcher.parents[1] / "include/node"
          if any(
              path.is_symlink() or not path.is_file()
              for path in (
                  headers / "node_api.h", headers / "node_api_types.h",
                  headers / "js_native_api.h", headers / "js_native_api_types.h",
              )
          ):
              raise SystemExit("selected Node 22 distribution lacks regular N-API headers")
          linked = subprocess.run(
              ["ldd", str(launcher)], capture_output=True, text=True, check=True,
          ).stdout
          native = sorted({
              str(Path(match.group(1)).resolve(strict=True))
              for line in linked.splitlines()
              if (match := re.search(r"(?:=>\s+)?(/[^ ]+)", line))
          })
          if not native:
              raise SystemExit("Node native runtime closure is empty")
          Path(os.environ["MANIFEST"]).write_text(json.dumps({
              "version": 1,
              "roles": {
                  "launcher": str(launcher),
                  "entrypoint": str(entrypoint),
                  "dependencies": str((root / "node_modules").resolve()),
                  "native_runtime": native,
                  "lockfile": str((root / "package-lock.json").resolve(strict=True)),
                  "headers": str(headers.absolute()),
              },
          }), encoding="utf-8")
          PY
          smoke="$(mktemp -d)"
          cd "$smoke"
          MANIFEST="$RUNNER_TEMP/pdd-wheel-vitest-toolchain.json" \
          "$RUNNER_TEMP/pdd-wheel-smoke/bin/python" - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path, PurePosixPath

          import pdd
          from pdd.sync_core.runner import RunnerConfig, _run_vitest
          from pdd.sync_core.types import EvidenceOutcome

          if "site-packages" not in str(Path(pdd.__file__).resolve()):
              raise SystemExit(f"pdd imported outside installed wheel: {pdd.__file__}")
          root = Path("candidate").resolve()
          root.mkdir()
          subprocess.run(["git", "init", "-q"], cwd=root, check=True)
          subprocess.run(["git", "config", "user.email", "wheel@example.com"], cwd=root, check=True)
          subprocess.run(["git", "config", "user.name", "Wheel Smoke"], cwd=root, check=True)
          (root / "tests").mkdir()
          (root / "tests/widget.test.ts").write_text(
              "import fs from 'node:fs';\n"
              "import { expect, test } from 'vitest';\n"
              "test('installed wheel authority', () => {\n"
              "  expect(process.env.PDD_TRUSTED_VITEST_OUTPUT).toBeUndefined();\n"
              "  expect(process.env.PDD_FRAMEWORK_COORDINATOR_NONDUMPABLE).toBe('1');\n"
              "  const authorityFailure = (category) => { throw new Error('PDD_VITEST_AUTHORITY_EXPOSURE=' + category); };\n"
              "  const trustedDecimal = (value) => { if (typeof value !== 'string' || !/^(0|[1-9][0-9]*)$/.test(value)) authorityFailure('identity-environment'); return BigInt(value); };\n"
              "  const expectedDevice = trustedDecimal(process.env.PDD_FRAMEWORK_OBSERVATION_DEVICE); const expectedInode = trustedDecimal(process.env.PDD_FRAMEWORK_OBSERVATION_INODE);\n"
              "  const isTrustedObservation = (metadata) => metadata.isFIFO() && metadata.dev === expectedDevice && metadata.ino === expectedInode;\n"
              "  const rejectTrustedObservation = (inspect, category) => { try { if (isTrustedObservation(inspect())) authorityFailure(category); } catch (error) { if (error instanceof Error && error.message.startsWith('PDD_VITEST_AUTHORITY_EXPOSURE=')) throw error; } };\n"
              "  rejectTrustedObservation(() => fs.fstatSync(198, { bigint: true }), 'direct-fd');\n"
              "  for (const name of fs.readdirSync('/proc/self/fd')) { const descriptor = Number(name); if (Number.isSafeInteger(descriptor) && descriptor >= 3 && descriptor !== 198) rejectTrustedObservation(() => fs.fstatSync(descriptor, { bigint: true }), 'self-alias'); }\n"
              "  let parentDescriptor; try { parentDescriptor = fs.openSync('/proc/' + process.ppid + '/fd/198', fs.constants.O_RDONLY | fs.constants.O_CLOEXEC); if (isTrustedObservation(fs.fstatSync(parentDescriptor, { bigint: true }))) authorityFailure('parent-reopen'); } catch (error) { if (error instanceof Error && error.message.startsWith('PDD_VITEST_AUTHORITY_EXPOSURE=')) throw error; } finally { if (typeof parentDescriptor === 'number') try { fs.closeSync(parentDescriptor); } catch (_) {} }\n"
              "});\n",
              encoding="utf-8",
          )
          (root / "vitest.config.json").write_text('{"test":{}}\n', encoding="utf-8")
          subprocess.run(["git", "add", "."], cwd=root, check=True)
          subprocess.run(["git", "commit", "-q", "-m", "wheel Vitest fixture"], cwd=root, check=True)
          roles = json.loads(Path(os.environ["MANIFEST"]).read_text(encoding="utf-8"))["roles"]
          execution, identities = _run_vitest(
              root, (PurePosixPath("tests/widget.test.ts"),), 30,
              RunnerConfig(
                  timeout_seconds=30,
                  vitest_command=(roles["launcher"], roles["entrypoint"]),
                  vitest_toolchain_manifest=Path(os.environ["MANIFEST"]),
              ),
          )
          if execution.outcome is not EvidenceOutcome.PASS or not identities:
              raise SystemExit(f"installed wheel Vitest lifecycle failed: {execution.detail}")
          PY

      - name: Verify packaged Vitest grammars offline
        run: |
          cd "$(mktemp -d)"
          "$RUNNER_TEMP/pdd-wheel-smoke/bin/python" - <<'PY'
          import importlib.metadata
          import shutil
          import socket
          import subprocess
          from pathlib import Path

          class DeniedSocket(socket.socket):
              def connect(self, _address):
                  raise AssertionError("Vitest grammar initialization attempted network access")

              def connect_ex(self, _address):
                  raise AssertionError("Vitest grammar initialization attempted network access")

          socket.socket = DeniedSocket
          import pdd
          from pdd.sync_core.runner import (
              COORDINATOR_ADDON_SOURCE_NAME,
              VITEST_GRAMMAR_VERSIONS,
              _vitest_parser,
          )

          if "site-packages" not in str(Path(pdd.__file__).resolve()):
              raise SystemExit(f"pdd imported outside isolated wheel: {pdd.__file__}")
          for distribution, expected in VITEST_GRAMMAR_VERSIONS.items():
              actual = importlib.metadata.version(distribution)
              if actual != expected:
                  raise SystemExit(f"{distribution}: expected {expected}, found {actual}")
          javascript = _vitest_parser("javascript")
          typescript = _vitest_parser("typescript")
          assert not javascript.parse(b"const value = 1;").root_node.has_error
          assert not typescript.parse(b"const value: number = 1;").root_node.has_error
          native = Path(pdd.__file__).resolve().parent / "sync_core/native"
          source = native / COORDINATOR_ADDON_SOURCE_NAME
          if not source.is_file() or source.is_symlink():
              raise SystemExit(f"packaged Vitest authority source is missing: {source}")
          binaries = tuple(native.glob("*.node"))
          if binaries:
              raise SystemExit(f"installed universal wheel contains native binaries: {binaries}")
          PY

      - name: Verify packaged preprocess include resolution
        run: |
          set -euo pipefail
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          "$RUNNER_TEMP/pdd-wheel-smoke/bin/python" - <<'PY'
          import pdd

          if "site-packages" not in pdd.__file__:
              raise SystemExit(f"pdd imported from checkout instead of installed wheel: {pdd.__file__}")
          PY
          printf '<include>docs/prompting_guide.md</include>\n' > test_include_python.prompt
          "$RUNNER_TEMP/pdd-wheel-smoke/bin/pdd" --quiet preprocess test_include_python.prompt --output preprocessed.txt
          grep -q "PDD Mental Model" preprocessed.txt

  repo-bloat-docker-e2e:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Repo Bloat Docker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: research/repo-bloat-benchmark/harness/runner/container

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Build hard-tier containers
        run: docker compose build

      - name: Start isolated agent
        run: docker compose up -d agent

      - name: Verify runner egress lockdown
        run: docker compose run --rm --use-aliases runner python3 harness/runner/container/egress_check.py --role runner

      - name: Verify isolated-agent integration path
        run: docker compose run --rm --use-aliases runner python3 -m harness.runner.container.integration_check

      - name: Stop hard-tier containers
        if: always()
        run: docker compose down -v
