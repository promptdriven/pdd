name: Backfill release notes with Claude Code

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to regenerate notes for (e.g. v0.0.249)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  rewrite-notes:
    runs-on: ubuntu-latest
    env:
      HAS_CLAUDE_OAUTH: ${{ (secrets.CLAUDE_CODE_OAUTH_TOKEN_1 != '' || secrets.CLAUDE_CODE_OAUTH_TOKEN_2 != '' || secrets.CLAUDE_CODE_OAUTH_TOKEN_3 != '' || secrets.CLAUDE_CODE_OAUTH_TOKEN != '') && 'true' || 'false' }}
    steps:
      - name: Fail if OAuth token missing
        if: env.HAS_CLAUDE_OAUTH != 'true'
        run: |
          echo "::error::No Claude Code OAuth token secret is set."
          exit 1

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Rewrite release notes with Claude Code
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN_1: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_1 }}
          CLAUDE_CODE_OAUTH_TOKEN_2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          CLAUDE_CODE_OAUTH_TOKEN_3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_3 }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$TAG"
          if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "::error::Tag ${tag} does not exist."
            exit 1
          fi
          prev_tag=$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)
          if [ -z "$prev_tag" ]; then
            echo "::error::No previous tag found before ${tag}."
            exit 1
          fi
          # Compute GitHub's auto-generated notes (What's Changed / PR authors /
          # New Contributors) for this range so we can append their contributor
          # attribution below the AI summary.
          auto_notes=$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$tag" -f previous_tag_name="$prev_tag" --jq .body 2>/dev/null || true)
          echo "Summarizing ${prev_tag}..${tag} with Claude Code."

          npm install -g @anthropic-ai/claude-code@2.1.150

          # Write full diff to a file then truncate via head-from-file to
          # avoid SIGPIPE under `set -o pipefail` (git diff sees EPIPE when
          # `head -c` closes stdin after 80KB).
          commits=$(git log "${prev_tag}..${tag}" --pretty=format:'- %s (%h)')
          stats=$(git diff --stat "${prev_tag}..${tag}")
          diff_full=$(mktemp)
          git diff "${prev_tag}..${tag}" \
            -- ':(exclude)*.lock' ':(exclude)package-lock.json' \
               ':(exclude)*test-durations.json' ':(exclude)dist/*' \
               ':(exclude)*.min.js' ':(exclude)*.snap' \
            >"$diff_full"
          diff=$(head -c 80000 "$diff_full")

          prompt_file=$(mktemp)
          {
            printf '%s\n' \
              'Write concise, accurate, user-facing release notes for a CLI tool from the' \
              'context below. Audience: developers using the `pdd` CLI.' \
              '' \
              'Format (markdown, no code fences around the whole thing):' \
              '- One-line summary at the top.' \
              '- Then sections "### Features", "### Fixes", "### Internal" — omit any' \
              '  section that has no entries.' \
              '- 1-7 bullets per section, each a single short sentence describing' \
              '  user-visible behavior. Reference PR/issue numbers if shown in the' \
              '  commit messages (e.g. "#1015"). Skip pure CI/test-infra churn unless' \
              '  it changes observable behavior.' \
              '' \
              'Do not invent changes. If the diff is dominated by one theme, lead with' \
              'it. Output only the release notes — no preamble, no sign-off.' \
              '' \
              'CONTEXT:'
            printf '\nCommits:\n%s\n\nFiles changed:\n%s\n\nDiff (truncated):\n%s\n' \
              "$commits" "$stats" "$diff"
          } >"$prompt_file"

          notes_file=$(mktemp --suffix=.md)
          scripts/claude_code_oauth_retry.sh "$notes_file" claude -p \
              --model sonnet \
              --tools "" \
              --no-session-persistence \
              --output-format text \
              <"$prompt_file"

          if [ ! -s "$notes_file" ]; then
            echo "::error::Claude Code produced no output."
            exit 1
          fi

          # Append GitHub's auto-generated attribution (What's Changed /
          # New Contributors / Full Changelog) below the AI summary so
          # contributor credit is preserved.
          final_file=$(mktemp --suffix=.md)
          {
            cat "$notes_file"
            if [ -n "$auto_notes" ]; then
              printf '\n\n---\n\n%s\n' "$auto_notes"
            fi
          } >"$final_file"

          echo "--- New release notes ---"
          cat "$final_file"
          echo "-------------------------"
          gh release edit "$tag" --notes-file "$final_file"
          echo "Updated release notes for $tag."
