name: CI Auto-Heal Drift

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: auto-heal-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  PDD_BUDGET_CAP: ${{ vars.PDD_BUDGET_CAP || '5.00' }}

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Skip if the triggering commit is from auto-heal (prevents infinite loops on main)
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore: auto-heal'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Determine changed modules (PR only)
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          # Scope to pdd/prompts/*_*.prompt files only; the --modules flag
          # passed to ci_drift_heal filters discover_prompt_files() results
          # to just these basenames, so the default scan path is irrelevant.
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- 'pdd/prompts/*_*.prompt')
          # Extract module names from changed PDD prompt files
          MODULES=""
          for f in $CHANGED_FILES; do
            basename=$(basename "$f" .prompt)
            if [ -n "$MODULES" ]; then
              MODULES="$MODULES $basename"
            else
              MODULES="$basename"
            fi
          done
          echo "modules=$MODULES" >> "$GITHUB_OUTPUT"
          echo "Changed modules: $MODULES"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run auto-heal (PR)
        if: github.event_name == 'pull_request' && steps.changed.outputs.modules != ''
        run: |
          python -m pdd.ci_drift_heal --modules ${{ steps.changed.outputs.modules }} --budget-cap "${{ env.PDD_BUDGET_CAP }}"

      - name: Run auto-heal (main)
        if: github.event_name == 'push'
        run: |
          python -m pdd.ci_drift_heal --budget-cap "${{ env.PDD_BUDGET_CAP }}"
