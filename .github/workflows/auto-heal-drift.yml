name: CI Auto-Heal Drift

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      # Only trigger when PDD-managed files change
      - 'pdd/**'
      - 'prompts/**'
      - 'context/**'
      - 'tests/**'
      - '.pdd/**'
  push:
    branches: [main]

concurrency:
  group: auto-heal-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  PDD_BUDGET_CAP: ${{ vars.PDD_BUDGET_CAP || '5.00' }}

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Skip if the triggering commit is from auto-heal (prevents infinite loops on main)
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore: auto-heal'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run auto-heal (PR)
        if: github.event_name == 'pull_request'
        run: |
          python -m pdd.ci_drift_heal --budget-cap "${{ env.PDD_BUDGET_CAP }}"

      - name: Run auto-heal (main)
        if: github.event_name == 'push'
        run: |
          python -m pdd.ci_drift_heal --budget-cap "${{ env.PDD_BUDGET_CAP }}" --skip-ci
