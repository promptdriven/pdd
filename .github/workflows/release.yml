name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-testpypi:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: pypi-test-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Verify artifacts
        run: python -m twine check dist/*

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          attestations: true

  publish-pypi:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Verify artifacts
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          attestations: true

      - name: Create GitHub Release with auto-notes (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub Release $tag already exists; skipping."
          else
            gh release create "$tag" --generate-notes --verify-tag --target main
          fi

      - name: Post release notes to Discord
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord post."
            exit 0
          fi
          tag="${{ github.ref_name }}"
          notes=$(gh release view "$tag" --json body --jq .body)
          url="https://github.com/${REPO}/releases/tag/${tag}"
          # Discord embed description max is 4096 chars; truncate with ellipsis to stay safe.
          if [ ${#notes} -gt 4000 ]; then
            notes="${notes:0:4000}…"
          fi
          payload=$(jq -n \
            --arg title "Release $tag" \
            --arg url "$url" \
            --arg description "$notes" \
            '{embeds:[{title:$title,url:$url,description:$description,color:3447003}]}')
          curl -sS -f -X POST -H "Content-Type: application/json" \
            -d "$payload" "$DISCORD_WEBHOOK_URL"
          echo "Posted release notes for $tag to Discord."
