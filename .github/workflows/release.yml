name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-testpypi:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: pypi-test-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Verify artifacts
        run: python -m twine check dist/*

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          attestations: true

  publish-pypi:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi-publish
    permissions:
      contents: write
      id-token: write
    env:
      HAS_CLAUDE_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' && 'true' || 'false' }}
      HAS_PDS: ${{ secrets.PDS_TOKEN != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Verify artifacts
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          attestations: true

      - name: Create GitHub Release with auto-notes (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub Release $tag already exists; skipping."
          else
            gh release create "$tag" --generate-notes --verify-tag --target main
          fi

      - name: Setup Node for Claude Code
        if: env.HAS_CLAUDE_OAUTH == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Rewrite release notes with Claude Code
        if: env.HAS_CLAUDE_OAUTH == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          prev_tag=$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)
          if [ -z "$prev_tag" ]; then
            echo "No previous tag found; keeping auto-generated notes."
            exit 0
          fi
          # Regenerate GitHub's auto-generated notes (What's Changed / PR
          # authors / New Contributors) fresh from the tag range so we can
          # append their contributor attribution below the AI summary.
          # We deliberately do NOT read the existing release body: on a
          # workflow re-run it may already be "AI summary + appended
          # auto-notes", and re-appending it would duplicate the notes and
          # break the idempotent release path. Matches backfill-release-notes.yml.
          auto_notes=$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$tag" -f previous_tag_name="$prev_tag" --jq .body 2>/dev/null || true)
          echo "Summarizing ${prev_tag}..${tag} with Claude Code."

          npm install -g @anthropic-ai/claude-code@2.1.150

          # Build context: commit log, diff stat, filtered/truncated diff.
          # Write full diff to a file then truncate via head-from-file to
          # avoid SIGPIPE under `set -o pipefail` (git diff sees EPIPE when
          # `head -c` closes stdin after 80KB).
          commits=$(git log "${prev_tag}..${tag}" --pretty=format:'- %s (%h)')
          stats=$(git diff --stat "${prev_tag}..${tag}")
          diff_full=$(mktemp)
          git diff "${prev_tag}..${tag}" \
            -- ':(exclude)*.lock' ':(exclude)package-lock.json' \
               ':(exclude)*test-durations.json' ':(exclude)dist/*' \
               ':(exclude)*.min.js' ':(exclude)*.snap' \
            >"$diff_full"
          diff=$(head -c 80000 "$diff_full")

          prompt_file=$(mktemp)
          {
            printf '%s\n' \
              'Write concise, accurate, user-facing release notes for a CLI tool from the' \
              'context below. Audience: developers using the `pdd` CLI.' \
              '' \
              'Format (markdown, no code fences around the whole thing):' \
              '- One-line summary at the top.' \
              '- Then sections "### Features", "### Fixes", "### Internal" — omit any' \
              '  section that has no entries.' \
              '- 1-7 bullets per section, each a single short sentence describing' \
              '  user-visible behavior. Reference PR/issue numbers if shown in the' \
              '  commit messages (e.g. "#1015"). Skip pure CI/test-infra churn unless' \
              '  it changes observable behavior.' \
              '' \
              'Do not invent changes. If the diff is dominated by one theme, lead with' \
              'it. Output only the release notes — no preamble, no sign-off.' \
              '' \
              'CONTEXT:'
            printf '\nCommits:\n%s\n\nFiles changed:\n%s\n\nDiff (truncated):\n%s\n' \
              "$commits" "$stats" "$diff"
          } >"$prompt_file"

          notes_file=$(mktemp --suffix=.md)
          if ! claude -p \
                --model sonnet \
                --tools "" \
                --no-session-persistence \
                --output-format text \
                <"$prompt_file" >"$notes_file"; then
            echo "Claude Code failed; keeping auto-generated notes."
            exit 0
          fi
          if [ ! -s "$notes_file" ]; then
            echo "Claude Code produced no output; keeping auto-generated notes."
            exit 0
          fi

          # Append GitHub's auto-generated attribution (What's Changed /
          # New Contributors / Full Changelog) below the AI summary so
          # contributor credit is preserved.
          final_file=$(mktemp --suffix=.md)
          {
            cat "$notes_file"
            if [ -n "$auto_notes" ]; then
              printf '\n\n---\n\n%s\n' "$auto_notes"
            fi
          } >"$final_file"

          echo "--- New release notes ---"
          cat "$final_file"
          echo "-------------------------"
          gh release edit "$tag" --notes-file "$final_file"
          echo "Updated release notes for $tag."

      # Best-effort release video: render via the PDS CLI, publish unlisted to
      # YouTube, and prepend the link to the release notes so the Discord post
      # below includes it. PyPI + the GitHub Release already shipped above, so
      # this step never fails the release (continue-on-error + internal exit 0).
      #
      # Activation requires (all optional — no-op until provisioned):
      #   secrets.PDS_TOKEN            PDS agent token authorized for release
      #                                projects (scopes: project:create,
      #                                project:read, project:write, pipeline:run,
      #                                artifact:read, distribution:package,
      #                                distribution:publish). A project-locked
      #                                token (e.g. an e2e profile) will NOT work.
      #   vars.PDS_CLI_PACKAGE         install spec for the @promptdriven/pds
      #                                CLI, for example @promptdriven/pds@latest
      #                                or a pinned version.
      #   vars.PDS_API_URL             PDS backend (default the CLI's built-in).
      #   vars.RELEASE_VIDEO_PROJECT_ID  optional stable PDS project to reuse
      #                                across releases (else a per-release
      #                                "PDD <tag> release" project is created).
      - name: Create release video and prepend link to notes (best-effort)
        if: env.HAS_PDS == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PDS_TOKEN: ${{ secrets.PDS_TOKEN }}
          PDS_API_URL: ${{ vars.PDS_API_URL }}
          PDS_CLI_PACKAGE: ${{ vars.PDS_CLI_PACKAGE }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          RELEASE_VIDEO_PROJECT_ID: ${{ vars.RELEASE_VIDEO_PROJECT_ID }}
        run: |
          set -uo pipefail
          tag="${{ github.ref_name }}"
          if [ -z "${PDS_CLI_PACKAGE:-}" ]; then
            echo "vars.PDS_CLI_PACKAGE not set; skipping release video."
            exit 0
          fi
          # Uses the runner's preinstalled Node (ubuntu-latest ships Node 20+);
          # if it is ever absent, skip rather than fail the release.
          if ! command -v npm >/dev/null 2>&1; then
            echo "::warning::node/npm not available on runner; skipping release video."
            exit 0
          fi
          if ! npm install -g "$PDS_CLI_PACKAGE"; then
            echo "::warning::pds CLI install from PDS_CLI_PACKAGE failed; skipping release video."
            exit 0
          fi
          if ! command -v claude >/dev/null 2>&1; then
            npm install -g @anthropic-ai/claude-code@2.1.150 \
              || { echo "::warning::claude-code install failed; skipping release video."; exit 0; }
          fi
          # Render + publish (unlisted). Best-effort: swallow any failure.
          if ! make release-video \
              RELEASE_TAG="$tag" \
              RELEASE_GIT_SHA="${{ github.sha }}" \
              ${RELEASE_VIDEO_PROJECT_ID:+RELEASE_VIDEO_PROJECT_ID="$RELEASE_VIDEO_PROJECT_ID"}; then
            echo "::warning::release video generation failed; release notes left unchanged."
            exit 0
          fi
          resp=".pdd/release-videos/${tag}/pds_response.json"
          youtube_url=$(grep -oE 'https?://(www\.)?(youtube\.com|youtu\.be)/[^"]+' "$resp" 2>/dev/null | head -1 || true)
          if [ -z "$youtube_url" ]; then
            echo "No YouTube URL in PDS response ($resp); release notes unchanged."
            exit 0
          fi
          echo "Release video: $youtube_url"
          # Prepend to the notes so it shows on the release page AND survives
          # the Discord post's tail-truncation below.
          if ! body=$(gh release view "$tag" --json body --jq .body); then
            echo "::warning::could not read release notes; video link not added."
            exit 0
          fi
          case "$body" in
            *"$youtube_url"*) echo "Release notes already reference the video." ;;
            *)
              if printf '🎥 **Release video:** %s\n\n%s\n' "$youtube_url" "$body" \
                  | gh release edit "$tag" --notes-file -; then
                echo "Prepended release video link to $tag notes."
              else
                echo "::warning::failed to update release notes with video link."
              fi ;;
          esac

      - name: Post release notes to Discord
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord post."
            exit 0
          fi
          tag="${{ github.ref_name }}"
          notes=$(gh release view "$tag" --json body --jq .body)
          url="https://github.com/${REPO}/releases/tag/${tag}"
          # Discord embed description max is 4096 chars; truncate with ellipsis to stay safe.
          if [ ${#notes} -gt 4000 ]; then
            notes="${notes:0:4000}…"
          fi
          payload=$(jq -n \
            --arg title "Release $tag" \
            --arg url "$url" \
            --arg description "$notes" \
            '{embeds:[{title:$title,url:$url,description:$description,color:3447003}]}')
          curl -sS -f -X POST -H "Content-Type: application/json" \
            -d "$payload" "$DISCORD_WEBHOOK_URL"
          echo "Posted release notes for $tag to Discord."
