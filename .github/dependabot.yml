version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
      github-actions-security:
        applies-to: security-updates
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      pip:
        patterns: ["*"]
      pip-security:
        applies-to: security-updates
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"
