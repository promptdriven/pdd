version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      pip:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 5
