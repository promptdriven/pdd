steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: pull-cache
    args: ['pull', '${_AR_IMAGE}:latest']
    allowFailure: true
  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    waitFor: ['pull-cache']
    args:
      - 'build'
      - '--cache-from=${_AR_IMAGE}:latest'
      - '-t'
      - '${_AR_IMAGE}:$BUILD_ID'
      - '-t'
      - '${_AR_IMAGE}:${_IMAGE_TAG}'
      - '-f'
      - 'ci/cloud-batch/Dockerfile'
      - '.'
  # Phantom-contract guard: verify the candidate image actually carries the
  # pytest plugins and CLI tools the tests rely on. If a requirements.txt /
  # Dockerfile drift leaves anything missing, this step fails BEFORE we
  # publish either the dependency-addressed tag or :latest, so a Cloud Batch
  # run cannot resolve an unverified worker.
  - name: 'gcr.io/cloud-builders/docker'
    id: verify-image-plugins
    waitFor: ['build-image']
    args:
      - 'run'
      - '--rm'
      - '--entrypoint'
      - 'python'
      - '${_AR_IMAGE}:$BUILD_ID'
      - '-c'
      - |
        import shutil
        import subprocess

        import pytest_timeout
        import xdist
        import pytest_mock
        import pytest_asyncio
        import pytest_cov
        import testmon

        missing = [name for name in ("gh",) if shutil.which(name) is None]
        if missing:
            raise SystemExit(f"image missing expected CLI tools: {missing}")
        subprocess.run(["gh", "--version"], check=True)
        print("image pytest-plugin and CLI contract OK")
  # Publish the dependency-addressed candidate and cache tag only after the
  # image clears the plugin contract. submit.sh resolves the candidate tag to
  # an immutable digest; it never submits :latest.
  - name: 'gcr.io/cloud-builders/docker'
    id: retag-and-push-latest
    waitFor: ['verify-image-plugins']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        docker tag '${_AR_IMAGE}:$BUILD_ID' '${_AR_IMAGE}:latest'
        docker push '${_AR_IMAGE}:$BUILD_ID'
        docker push '${_AR_IMAGE}:${_IMAGE_TAG}'
        docker push '${_AR_IMAGE}:latest'
options:
  machineType: 'E2_HIGHCPU_8'
substitutions:
  _AR_IMAGE: 'us-central1-docker.pkg.dev/prompt-driven-development-stg/pdd-ci/pdd-test'
  _IMAGE_TAG: 'deps-local'
timeout: '1800s'
