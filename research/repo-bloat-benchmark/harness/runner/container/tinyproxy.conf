# Gateway ACL for the §8.1.1 hard tier: the ONLY egress the benchmark
# network can perform is CONNECT to the pinned provider host on 443.
Port 8888
Listen 0.0.0.0
Timeout 600

# Only the internal benchmark network may use the gateway.
Allow 0.0.0.0/0

# Refuse everything except the provider endpoint.
FilterDefaultDeny Yes
FilterType fnmatch
Filter "/etc/tinyproxy/filter"

ConnectPort 443

LogLevel Notice
