# Gateway ACL for the §8.1.1 hard tier: the ONLY egress the benchmark
# network can perform is CONNECT to the pinned provider host on 443.
Port 8888
Listen 0.0.0.0
Timeout 600

# Client ACL (defense in depth): only the proxy-egress subnet may use the
# gateway. The agent container has no interface on this network at all, so
# it cannot reach the gateway regardless; this Allow bounds the blast radius
# if a future network/port mapping is added. Adjust the CIDR if Docker
# assigns rb-proxy-egress a different subnet (see egress_check --role runner).
Allow 172.16.0.0/12
Allow 192.168.0.0/16
Allow 10.0.0.0/8

# Refuse CONNECT/GET to everything except the provider endpoint.
FilterDefaultDeny Yes
FilterType fnmatch
Filter "/etc/tinyproxy/filter"

ConnectPort 443

LogLevel Notice
