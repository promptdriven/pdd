    name: "Protected reviewed checker release and pinned wheel digest"
    status: pending
    exact_repository_sha: null
    validation_commands:
      - "gh release view \"$PDD_CHECKER_RELEASE_REF\" --repo promptdriven/pdd --json tagName,targetCommitish,isDraft,isPrerelease"
      - "gh release download \"$PDD_CHECKER_RELEASE_REF\" --repo promptdriven/pdd --pattern '*.whl' --dir \"$RUNNER_TEMP/released-checker\""
      - "sha256sum --check \"$PDD_CHECKER_WHEEL_SHA256_FILE\""
      - "pytest -q tests/test_sync_core_artifact_provenance.py tests/test_sync_core_lifecycle.py -k 'candidate or released or credential or environment'"
    required_predicate:
      release_ref_protected_and_reviewed: true
      release_target_is_exact_repository_sha: true
      release_is_draft: false
      release_is_prerelease: false
      downloaded_wheel_sha256_matches_protected_pin: true
      checker_owns_scenarios_metrics_predicate_and_signing: true
      unconditional_pass_candidate_is_rejected: true
      scenario_editing_candidate_is_rejected: true
      environment_printing_candidate_is_rejected: true
      candidate_children_have_credentials: false
    artifact_check_urls: []
    predicate_result: "No protected checker release is authorized."
    blocker: "PR #1995 and every required exact-head hosted check must pass and merge first."
    owning_pr: "https://github.com/promptdriven/pdd/pull/1995"
  - order: 3
    name: "Transactional generation-to-staging and crash recovery"
    status: pending
    exact_repository_sha: null
    validation_commands:
      - "pytest -q tests/test_sync_core_transaction.py tests/test_sync_core_lifecycle.py -k 'generation or crash or journal or install or recovery or zero_write'"
      - "pytest -q tests/test_sync_core_transaction.py -k 'symlink or nofollow or descriptor or blob_preflight'"
    required_predicate:
      generation_writes_only_to_staging: true
      durable_transaction_covers_artifacts_metadata_evidence_report_and_fingerprint: true
      descriptor_relative_nofollow_commit: true
      all_wal_blobs_verified_before_first_destination_change: true
      every_injected_death_recovers_to_complete_old_or_new_state: true
      immediate_rerun_write_count: 0
    artifact_check_urls: []
    predicate_result: "No protected exact-SHA generation-to-staging crash matrix exists."
    blocker: "Protected checker release is unavailable."
    owning_pr: null
  - order: 4
    name: "Complete protected runner adapters"
    status: in-progress
    exact_repository_sha: "af1b88f207432e8a01b403783d0484942f522a68"
    failure_baseline_sha: "b09b6bef2c8c4bee762965be463527cd0b050154"
    diagnostic_head_sha: "af1b88f207432e8a01b403783d0484942f522a68"
    current_stage: "stage-a0-review-sidecar-correction"
    cause_red_status: pending
    validation_commands:
      - "pytest -q tests/test_sync_core_runner_pytest.py tests/test_sync_core_runner_vitest.py tests/test_sync_core_supervisor.py"
      - |
          set -euo pipefail
          wheel_evidence="$RUNNER_TEMP/step4-observation/wheel-package-evidence"
          gh run download "$PDD_RUN_ID" --repo promptdriven/pdd \
            --name "vitest-wheel-termination-evidence-$PDD_SHA" \
            --dir "$wheel_evidence"
          wheel_attestation="$wheel_evidence/vitest-wheel-package-attestation-v1.json"
          wheel_attestation_sha256="$(sha256sum "$wheel_attestation" | cut -d' ' -f1)"
          test "$wheel_attestation_sha256" = "$(tr -d '\n' < "$wheel_attestation.sha256")"
          jq -e \
            --arg head "$PDD_SHA" \
            --arg producer "$PDD_REVIEWED_PRODUCER_SHA256" \
            '(.schema == "vitest-wheel-package-attestation-v1") and
             (.diagnostic_head_sha == $head) and
             (.producer_sha256 == $producer) and
             (.installed_runner_sha256 == $producer) and
             (.import_origin == "installed-wheel")' \
            "$wheel_attestation"
          wheel_sha256="$(jq -er '.wheel_sha256 | select(test("^[0-9a-f]{64}$"))' "$wheel_attestation")"
          artifact_names=(
            "vitest-no-result-observation-$PDD_SHA"
            "vitest-wheel-no-result-observation-$PDD_SHA"
          )
          expected_lanes=(source installed-wheel)
          for index in "${!artifact_names[@]}"
          do
            artifact_name="${artifact_names[$index]}"
            expected_lane="${expected_lanes[$index]}"
            destination="$RUNNER_TEMP/step4-observation/$artifact_name"
            gh run download "$PDD_RUN_ID" --repo promptdriven/pdd --name "$artifact_name" --dir "$destination"
            observation="$destination/vitest-no-result-observation-v1.json"
            observation_sidecar="$observation.sha256"
            observation_parent="$(dirname "$observation")"
            chmod 700 "$observation_parent"
            chmod 600 "$observation" "$observation_sidecar"
