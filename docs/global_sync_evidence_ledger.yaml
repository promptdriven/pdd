    validation_commands:
      - "test -z \"$(git status --porcelain=v1 --untracked-files=all)\""
      - "git merge-base --is-ancestor \"$PDD_PROTECTED_BASE_SHA\" \"$PDD_SHA\""
      - "test \"$(git rev-list --count \"$PDD_PROTECTED_BASE_SHA..$PDD_SHA\")\" -eq 5 && test -z \"$(git rev-list --merges \"$PDD_PROTECTED_BASE_SHA..$PDD_SHA\")\" && test \"$(git rev-list --parents -n 1 \"$PDD_FOUNDATION_SHA\" | wc -w | tr -d ' ')\" -eq 2 && test \"$(git rev-list --parents -n 1 \"$PDD_TRANSACTION_SHA\" | wc -w | tr -d ' ')\" -eq 2 && test \"$(git rev-list --parents -n 1 \"$PDD_RUNNER_TRUST_SHA\" | wc -w | tr -d ' ')\" -eq 2 && test \"$(git rev-list --parents -n 1 \"$PDD_COMMAND_ROUTING_SHA\" | wc -w | tr -d ' ')\" -eq 2 && test \"$(git rev-list --parents -n 1 \"$PDD_ROLLOUT_SHA\" | wc -w | tr -d ' ')\" -eq 2 && test \"$(git rev-parse \"$PDD_FOUNDATION_SHA^\")\" = \"$PDD_PROTECTED_BASE_SHA\" && test \"$(git rev-parse \"$PDD_TRANSACTION_SHA^\")\" = \"$PDD_FOUNDATION_SHA\" && test \"$(git rev-parse \"$PDD_RUNNER_TRUST_SHA^\")\" = \"$PDD_TRANSACTION_SHA\" && test \"$(git rev-parse \"$PDD_COMMAND_ROUTING_SHA^\")\" = \"$PDD_RUNNER_TRUST_SHA\" && test \"$(git rev-parse \"$PDD_ROLLOUT_SHA^\")\" = \"$PDD_COMMAND_ROUTING_SHA\" && test \"$PDD_ROLLOUT_SHA\" = \"$PDD_SHA\""
      - "jq -e --arg foundation \"$PDD_FOUNDATION_SHA\" --arg transaction \"$PDD_TRANSACTION_SHA\" --arg runner \"$PDD_RUNNER_TRUST_SHA\" --arg routing \"$PDD_COMMAND_ROUTING_SHA\" --arg rollout \"$PDD_ROLLOUT_SHA\" '(.verdict == \"APPROVE\") and (.reviewed_commits == [$foundation,$transaction,$runner,$routing,$rollout]) and (.enforcement_activated_in_foundation_commits == false)' \"$PDD_STEP1_LAYER_REVIEW\""
      - "pytest -q tests/test_sync_core_reporting.py::test_repository_identity_does_not_activate_enforcement_without_policy tests/test_sync_core_pdd_rollout_policy.py::test_rollout_profiles_cannot_self_authorize"
      - |
          set -euo pipefail
          mapfile -t step1_nodes < "$PDD_STEP1_TEST_MANIFEST"
          test "${#step1_nodes[@]}" -gt 0
          pytest -q "${step1_nodes[@]}" --junitxml="$RUNNER_TEMP/step1-source.xml"
          rm -rf "$RUNNER_TEMP/step1-dist" "$RUNNER_TEMP/step1-venv" "$RUNNER_TEMP/step1-wheel-tests"
          python -m build --wheel --outdir "$RUNNER_TEMP/step1-dist"
          python -m venv "$RUNNER_TEMP/step1-venv"
          wheel="$(find "$RUNNER_TEMP/step1-dist" -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$wheel"
          "$RUNNER_TEMP/step1-venv/bin/pip" install --no-index --find-links "$PDD_OFFLINE_WHEELHOUSE" "$wheel" pytest pytest-timeout
          while IFS= read -r node; do
            file="${node%%::*}"
            mkdir -p "$RUNNER_TEMP/step1-wheel-tests/$(dirname "$file")"
            cp "$file" "$RUNNER_TEMP/step1-wheel-tests/$file"
          done < "$PDD_STEP1_TEST_MANIFEST"
          (
            cd "$RUNNER_TEMP/step1-wheel-tests"
            PDD_REQUIRE_INSTALLED_WHEEL=1 "$RUNNER_TEMP/step1-venv/bin/pytest" -q "${step1_nodes[@]}" --junitxml="$RUNNER_TEMP/step1-wheel.xml"
          )
          python -c 'import sys, xml.etree.ElementTree as E; rows=lambda p: sorted((n.attrib.get("classname",""),n.attrib["name"],next((c.tag for c in n if c.tag in {"failure","error","skipped"}),"passed")) for n in E.parse(p).iter("testcase")); assert rows(sys.argv[1]) == rows(sys.argv[2])' "$RUNNER_TEMP/step1-source.xml" "$RUNNER_TEMP/step1-wheel.xml"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
      - "gh run view \"$PDD_RUN_ID\" --repo promptdriven/pdd --json headSha,jobs"
