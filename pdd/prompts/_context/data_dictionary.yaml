# Data Dictionary — Single source of truth for all field names, types, and enums
# Generated by Step 8.5 of the architecture workflow (issue #1466)
# All module prompts MUST use these exact names and types

serialization:
  python_to_json: snake_case        # verified from Step 2b codebase scan (Pydantic v2 model_dump defaults)
  json_wire_format: snake_case      # .pdd/ artifact files use snake_case field names
  typescript_fields: n/a            # project is Python-only; no TypeScript surfaces
  conversion_layer: none            # Pydantic v2 model_dump(mode='json') used directly; no alias layer

models:
  GenerationSourceContract:
    storage: .pdd/generation-contracts/{run_id}.json
    description: "Central shared artifact (UUID-keyed) passed between all 6 generation quality modules"
    fields:
      - name: run_id
        python_type: str
        required: true
        constraints: "UUID v4 string; unique per generation run"
      - name: schema_version
        python_type: int
        required: true
        default: 1
        constraints: "Incremented on breaking field changes"
      - name: prd_text
        python_type: Optional[str]
        required: false
        default: null
        constraints: "Raw PRD/issue text; may be None for contract-first generation"
      - name: features
        python_type: List[FeatureRequirement]
        required: true
        default: "[]"
      - name: example_classifications
        python_type: List[ExampleClassification]
        required: true
        default: "[]"
      - name: interface_facts
        python_type: List[InterfaceFact]
        required: true
        default: "[]"
      - name: readiness_findings
        python_type: List[ReadinessFinding]
        required: true
        default: "[]"
      - name: grounded_from_contract
        python_type: bool
        required: true
        default: false
        constraints: "True when no source files existed; generation produced interfaces first"
    primary_key: run_id

  FeatureRequirement:
    storage: embedded in GenerationSourceContract.features
    description: "One per extracted PRD requirement; tracks priority, kind, vagueness, and acceptance detail"
    fields:
      - name: requirement_id
        python_type: str
        required: true
        constraints: "UUID v4 string; unique within a run"
      - name: description
        python_type: str
        required: true
        constraints: "Human-readable description extracted from PRD"
      - name: priority
        python_type: RequirementPriority
        required: true
        constraints: "Enum: p0 or p1"
      - name: kind
        python_type: RequirementKind
        required: true
        constraints: "Enum: api, route, schema, ui, cli, job, test, script"
      - name: is_vague
        python_type: bool
        required: true
        default: false
        constraints: "True when requirement cannot be mechanically verified from PRD text"
      - name: acceptance_criteria
        python_type: str
        required: false
        default: '""'
        constraints: "Must be non-empty for p0 requirements (enforced by model_validator)"
      - name: coverage_pointer
        python_type: Optional[str]
        required: false
        default: null
        constraints: "Reference to ExampleClassification or coverage_matrix entry"

  ExampleClassification:
    storage: embedded in GenerationSourceContract.example_classifications
    description: "Illustrative vs. exhaustive classification per feature with required variants list"
    fields:
      - name: feature_id
        python_type: str
        required: true
        constraints: "References FeatureRequirement.requirement_id"
      - name: kind
        python_type: ExampleKind
        required: true
        constraints: "Enum: illustrative, exhaustive, unknown"
      - name: required_variants
        python_type: List[str]
        required: true
        default: "[]"
        constraints: "Non-empty when kind=illustrative; records required variant list"
      - name: coverage_matrix
        python_type: Optional[dict]
        required: false
        default: null
        constraints: "Present when kind=illustrative and a coverage matrix was derived"

  InterfaceFact:
    storage: embedded in GenerationSourceContract.interface_facts
    description: "Immutable AST-extracted symbol record; source SHA-256 detects stale facts"
    fields:
      - name: fact_id
        python_type: str
        required: true
        constraints: "UUID v4 string"
      - name: symbol_name
        python_type: str
        required: true
        constraints: "Fully-qualified name as it appears in source (e.g. module.ClassName.method)"
      - name: kind
        python_type: InterfaceFactKind
        required: true
        constraints: "Enum: function, class_field, export, endpoint, config_key, component_prop"
      - name: signature
        python_type: Optional[str]
        required: false
        default: null
        constraints: "Function signature string (e.g. '(x: int, y: str) -> bool'); None for non-callable facts"
      - name: source_path
        python_type: str
        required: true
        constraints: "Relative path from project root to the source file"
      - name: source_sha256
        python_type: str
        required: true
        constraints: "SHA-256 hex digest of the source file at extraction time"
      - name: needs_llm_review
        python_type: bool
        required: true
        default: false
        constraints: "True for non-Python surfaces where deterministic AST parsing is unavailable"

  WiringCheckResult:
    storage: embedded in GenerationAuditRecord gate_results
    description: "One per wiring completeness check; status + diagnostic"
    fields:
      - name: check_kind
        python_type: WiringCheckKind
        required: true
        constraints: "Enum: handler_registration, route_reachability, config_declaration, module_test_coverage, script_executable"
      - name: status
        python_type: WiringStatus
        required: true
        constraints: "Enum: pass, warn, fail"
      - name: diagnostic
        python_type: str
        required: true
        constraints: "Human-readable message explaining the check result; actionable on fail"

  TestQualityFinding:
    storage: embedded in GenerationAuditRecord gate_results
    description: "One per flagged test assertion; includes file path and line reference"
    fields:
      - name: kind
        python_type: TestQualityFindingKind
        required: true
        constraints: "Enum: brittle_selector, private_impl_assertion, exact_dynamic_text, no_async_polling"
      - name: file_path
        python_type: str
        required: true
        constraints: "Relative path from project root to the test file"
      - name: line_number
        python_type: int
        required: true
        constraints: "1-based line number of the flagged assertion"
      - name: suggested_fix
        python_type: str
        required: true
        constraints: "Actionable suggestion for making the assertion more robust"

  ReadinessFinding:
    storage: embedded in GenerationSourceContract.readiness_findings
    description: "Blocking or clarification finding that gates further generation steps"
    fields:
      - name: finding_id
        python_type: str
        required: true
        constraints: "UUID v4 string"
      - name: severity
        python_type: FindingSeverity
        required: true
        constraints: "Enum: blocker, warning"
      - name: message
        python_type: str
        required: true
        constraints: "Human-readable explanation; must be actionable for blocker severity"
      - name: requirement_id
        python_type: Optional[str]
        required: false
        default: null
        constraints: "References FeatureRequirement.requirement_id when finding targets a specific requirement"

  GenerationAuditRecord:
    storage: .pdd/evidence/generation-audit/{run_id}.json
    description: "Top-level evidence manifest; extends evidence_manifest.py pattern (SHA-256, ManifestView)"
    fields:
      - name: run_id
        python_type: str
        required: true
        constraints: "UUID v4 string; matches GenerationSourceContract.run_id"
      - name: schema_version
        python_type: int
        required: true
        default: 1
      - name: requirement_entries
        python_type: List[RequirementAuditEntry]
        required: true
        default: "[]"
    primary_key: run_id

  RequirementAuditEntry:
    storage: embedded in GenerationAuditRecord.requirement_entries
    description: "One per FeatureRequirement; maps requirement to generated artifacts and gate results"
    fields:
      - name: requirement_id
        python_type: str
        required: true
        constraints: "References FeatureRequirement.requirement_id"
      - name: description
        python_type: str
        required: true
      - name: priority
        python_type: RequirementPriority
        required: true
      - name: generated_files
        python_type: List[str]
        required: true
        default: "[]"
        constraints: "Relative paths; SHA-256 of each file recorded alongside path as 'path::sha256'"
      - name: generated_tests
        python_type: List[str]
        required: true
        default: "[]"
        constraints: "Relative paths to test files covering this requirement"
      - name: contracts_validated
        python_type: List[str]
        required: true
        default: "[]"
        constraints: "InterfaceFact.fact_id values validated for this requirement"
      - name: gate_results
        python_type: List[Union[WiringCheckResult, TestQualityFinding]]
        required: true
        default: "[]"
      - name: audit_status
        python_type: AuditEntryStatus
        required: true
        constraints: "Enum: covered, partial, skipped, waived"

enums:
  RequirementPriority:
    description: "Priority level for a FeatureRequirement; p0 requirements must have non-empty acceptance_criteria"
    values:
      - name: P0
        value: "p0"
        description: "Must-have; generation is blocked if p0 requirements are unresolved"
      - name: P1
        value: "p1"
        description: "Should-have; warning issued when p1 requirements lack acceptance detail"

  FindingSeverity:
    description: "Severity of a ReadinessFinding emitted by generation_readiness"
    values:
      - name: BLOCKER
        value: "blocker"
        description: "Blocks further generation; downstream orchestrators must not proceed"
      - name: WARNING
        value: "warning"
        description: "Clarification requested; generation may continue with degraded confidence"

  ExampleKind:
    description: "Whether examples in the PRD are illustrative (non-exhaustive) or exhaustive (complete list)"
    values:
      - name: ILLUSTRATIVE
        value: "illustrative"
        description: "Examples show possibilities; a coverage matrix or required-variant list must be derived"
      - name: EXHAUSTIVE
        value: "exhaustive"
        description: "Examples are the complete required set; recorded as source-truth metadata"
      - name: UNKNOWN
        value: "unknown"
        description: "Cannot be determined from PRD text; treated as illustrative by default"

  RequirementKind:
    description: "Runtime surface or artifact kind for a FeatureRequirement"
    values:
      - name: API
        value: "api"
        description: "HTTP endpoint or RPC interface"
      - name: ROUTE
        value: "route"
        description: "URL route or navigation path"
      - name: SCHEMA
        value: "schema"
        description: "Data model, Pydantic schema, or database schema"
      - name: UI
        value: "ui"
        description: "Frontend component or user-interface surface"
      - name: CLI
        value: "cli"
        description: "Click command or CLI entrypoint"
      - name: JOB
        value: "job"
        description: "Background job, scheduled task, or worker"
      - name: TEST
        value: "test"
        description: "Test file or test coverage requirement"
      - name: SCRIPT
        value: "script"
        description: "Executable script with CLI entry point"

  InterfaceFactKind:
    description: "Kind of AST-extracted symbol recorded in InterfaceFact"
    values:
      - name: FUNCTION
        value: "function"
        description: "Module-level or class-level function/method with signature"
      - name: CLASS_FIELD
        value: "class_field"
        description: "Annotated class or dataclass field (ast.AnnAssign)"
      - name: EXPORT
        value: "export"
        description: "Symbol listed in __all__"
      - name: ENDPOINT
        value: "endpoint"
        description: "FastAPI or Click route/command decorator"
      - name: CONFIG_KEY
        value: "config_key"
        description: "Environment variable access or config key reference"
      - name: COMPONENT_PROP
        value: "component_prop"
        description: "Dataclass or Pydantic field exposed as a component prop"

  WiringCheckKind:
    description: "Which wiring completeness check a WiringCheckResult represents"
    values:
      - name: HANDLER_REGISTRATION
        value: "handler_registration"
        description: "Generated handlers appear in router/app registration"
      - name: ROUTE_REACHABILITY
        value: "route_reachability"
        description: "URL patterns in route declarations match handler paths"
      - name: CONFIG_DECLARATION
        value: "config_declaration"
        description: "Required env/config keys declared in generated modules appear in config files"
      - name: MODULE_TEST_COVERAGE
        value: "module_test_coverage"
        description: "Each generated module has a corresponding tests/test_*.py file"
      - name: SCRIPT_EXECUTABLE
        value: "script_executable"
        description: "Generated scripts have executable bit and a CLI entry point"

  WiringStatus:
    description: "Outcome of a single wiring check"
    values:
      - name: PASS
        value: "pass"
        description: "Check passed; no action required"
      - name: WARN
        value: "warn"
        description: "Check found a potential issue; review recommended"
      - name: FAIL
        value: "fail"
        description: "Check failed; raises ArchitectureConformanceError for p0 checks"

  TestQualityFindingKind:
    description: "Category of test quality problem detected by test_quality_gate"
    values:
      - name: BRITTLE_SELECTOR
        value: "brittle_selector"
        description: "CSS utility class or XPath selector used instead of semantic selector or accessible name"
      - name: PRIVATE_IMPL_ASSERTION
        value: "private_impl_assertion"
        description: "Assertion on private/internal attribute (leading _) or mock/patch of non-public symbol"
      - name: EXACT_DYNAMIC_TEXT
        value: "exact_dynamic_text"
        description: "assertEqual/assert_text with exact timestamp, UUID, or numeric ID that varies across runs"
      - name: NO_ASYNC_POLLING
        value: "no_async_polling"
        description: "Playwright/Selenium test without wait_for or equivalent polling for async state"

  AuditEntryStatus:
    description: "Coverage status of a single FeatureRequirement in the generation audit"
    values:
      - name: COVERED
        value: "covered"
        description: "Requirement has generated files, tests, and all gate checks passed"
      - name: PARTIAL
        value: "partial"
        description: "Requirement has some generated artifacts but tests or wiring checks are missing"
      - name: SKIPPED
        value: "skipped"
        description: "Requirement was not addressed in this generation run"
      - name: WAIVED
        value: "waived"
        description: "Requirement was explicitly waived; check_audit does not fail on waived items"

conventions:
  file_naming: snake_case          # e.g., generation_source_contract.py, test_quality_gate.py
  class_naming: PascalCase         # e.g., GenerationSourceContract, FeatureRequirement
  function_naming: snake_case      # e.g., analyze_readiness, emit_audit
  python_models: PascalCase        # Pydantic v2 BaseModel subclasses with snake_case fields
  private_helpers: leading_underscore  # e.g., _extract_vague_phrases
  exception_base: ArchitectureConformanceError  # extend for wiring validation failures
  logging: "logging.getLogger(__name__)"
  llm_calls: "llm_invoke()"
  test_marks:
    integration: "@pytest.mark.integration"  # for LLM-dependent tests
    asyncio_mode: strict
