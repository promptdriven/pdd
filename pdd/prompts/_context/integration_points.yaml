# Integration Points — Single source of truth for module wiring
# Generated by Step 8.5 of the architecture workflow (issue #1466)
#
# Describes how the 6 generation quality modules (issue #1466) wire together
# and integrate with existing PDD infrastructure.

# --- Storage Paths ---
storage_paths:
  generation_contracts: ".pdd/generation-contracts/{run_id}.json"
  generation_audit: ".pdd/evidence/generation-audit/{run_id}.json"
  evidence_base: ".pdd/evidence/"

# --- Module Dependency Graph ---
# Read as: module X depends_on module Y (Y must be generated before X)

module_dependencies:
  generation_source_contract:
    filepath: pdd/generation_source_contract.py
    depends_on: []
    consumed_by:
      - pdd/generation_readiness.py
      - pdd/interface_grounder.py
      - pdd/wiring_validator.py
      - pdd/test_quality_gate.py
      - pdd/generation_audit.py
    role: "Foundational shared schema; all other generation quality modules import GenerationSourceContract from here"

  generation_readiness:
    filepath: pdd/generation_readiness.py
    depends_on:
      - pdd/generation_source_contract.py
    consumed_by:
      - pdd/generation_audit.py
      - pdd/agentic_architecture_orchestrator.py
      - pdd/agentic_checkup_orchestrator.py  # via checkup_gates integration
    role: "Pre-generation gate; analyze_readiness() called before architecture generation starts"

  interface_grounder:
    filepath: pdd/interface_grounder.py
    depends_on:
      - pdd/generation_source_contract.py
    consumed_by:
      - pdd/generation_audit.py
      - pdd/agentic_architecture_orchestrator.py
    role: "Grounds generation in real interfaces; ground_interfaces() called after generation_readiness passes"

  wiring_validator:
    filepath: pdd/wiring_validator.py
    depends_on:
      - pdd/generation_source_contract.py
      - pdd/architecture_sync.py
    consumed_by:
      - pdd/generation_audit.py
      - pdd/agentic_architecture_orchestrator.py
    role: "Post-generation completeness gate; validate_wiring() called after code files are generated"

  test_quality_gate:
    filepath: pdd/test_quality_gate.py
    depends_on:
      - pdd/generation_source_contract.py
    consumed_by:
      - pdd/generation_audit.py
      - pdd/agentic_test_orchestrator.py
    role: "Post-generation test quality gate; check_test_quality() called after tests are generated"

  generation_audit:
    filepath: pdd/generation_audit.py
    depends_on:
      - pdd/generation_source_contract.py
      - pdd/generation_readiness.py
      - pdd/interface_grounder.py
      - pdd/wiring_validator.py
      - pdd/test_quality_gate.py
      - pdd/evidence_manifest.py
    consumed_by:
      - pdd/agentic_architecture_orchestrator.py  # final post-generation step
    role: "Evidence emission; emit_audit() called as the final step after all other gates pass"

# --- Orchestrator Integration Points ---
orchestrator_hooks:
  agentic_architecture_orchestrator:
    filepath: pdd/agentic_architecture_orchestrator.py
    generation_quality_hooks:
      - step: pre_generation
        call: "generation_readiness.analyze_readiness(prd_text, contract)"
        blocks_on: "ReadinessFinding with severity=blocker"
      - step: pre_generation
        call: "interface_grounder.ground_interfaces(contract, source_paths)"
        blocks_on: "Never; populates interface_facts for downstream validation"
      - step: post_generation
        call: "wiring_validator.validate_wiring(contract, project_root)"
        blocks_on: "ArchitectureConformanceError (any p0 WiringCheckResult with status=fail)"
      - step: post_generation
        call: "generation_audit.emit_audit(contract, generated_files, wiring_results, quality_findings)"
        blocks_on: "Never; always emits the audit even on partial coverage"

  agentic_test_orchestrator:
    filepath: pdd/agentic_test_orchestrator.py
    generation_quality_hooks:
      - step: post_test_generation
        call: "test_quality_gate.check_test_quality(test_files, contract)"
        blocks_on: "Configurable; warnings by default, blocks in strict mode"

# --- Existing Infrastructure Reuse ---
existing_modules_reused:
  - name: evidence_manifest
    filepath: pdd/evidence_manifest.py
    reused_by: generation_audit
    pattern: "Extend SHA-256 fingerprinting and ManifestView patterns for GenerationAuditRecord"

  - name: architecture_sync
    filepath: pdd/architecture_sync.py
    reused_by: wiring_validator
    pattern: "Extend ArchitectureConformanceError for wiring validation failures; reuse conformance gate pattern"

  - name: checkup_gates
    filepath: pdd/checkup_gates.py
    reused_by: generation_readiness
    pattern: "Emit ReadinessFinding records into checkup_gates pipeline via existing finding dispatch"

  - name: content_selector
    filepath: pdd/content_selector.py
    reused_by: interface_grounder
    pattern: "Reuse ast module patterns already used in content_selector for deterministic interface extraction"

  - name: auto_include
    filepath: pdd/auto_include.py
    reused_by: interface_grounder
    pattern: "Reuse include/exclude heuristics for scoping interface extraction to relevant source files"

  - name: llm_invoke
    filepath: pdd/llm_invoke.py
    reused_by:
      - generation_readiness
      - interface_grounder
    pattern: "llm_invoke() for non-deterministic surfaces where AST parsing is insufficient (needs_llm_review=True facts)"

  - name: agentic_common
    filepath: pdd/agentic_common.py
    reused_by:
      - generation_readiness
      - generation_audit
    pattern: "Common orchestrator utilities (cost tracking, step state, GitHub comment posting)"

# --- Environment Variables ---
environment_variables:
  - name: PDD_MODEL_DEFAULT
    purpose: "Default LLM model for llm_invoke() calls in generation quality modules"
    required_by:
      - generation_readiness
      - interface_grounder
    notes: "Always honored even when PDD_ALLOW_INTERACTIVE=0"

  - name: PDD_ALLOW_INTERACTIVE
    purpose: "Allow interactive-only models (github_copilot/*, chatgpt/*, ollama/*) in non-interactive contexts"
    required_by: []
    notes: "Set to 1 from a terminal to opt in; Cloud Run / CI must leave unset"

  - name: PDD_STRICT_DOC_SYNC
    purpose: "Enable strict documentation sync mode for pre-checkup gate"
    required_by:
      - pdd/pre_checkup_gate.py
    notes: "Docs-only diffs short-circuit the pre-checkup gate in non-strict mode"

# --- Error Patterns ---
error_patterns:
  - name: ArchitectureConformanceError
    module: pdd/architecture_sync.py
    description: "Raised by wiring_validator.validate_wiring() when any p0 WiringCheckResult has status=fail"
    handled_by: "agentic_architecture_orchestrator — logs diagnostic and halts generation"

  - name: FileNotFoundError
    module: builtins
    description: "Raised by load_source_contract() and load_audit() when artifact file is missing"
    handled_by: "Caller; typically means the generation run did not complete"

  - name: ValidationError
    module: pydantic
    description: "Raised by load_source_contract() and load_audit() when JSON does not match schema"
    handled_by: "Caller; indicates schema_version mismatch or corrupt artifact"

# --- Test Infrastructure ---
test_infrastructure:
  runner: pytest
  asyncio_mode: strict
  markers:
    - name: integration
      decorator: "@pytest.mark.integration"
      usage: "LLM-dependent tests in generation_readiness and interface_grounder"
  fixture_locations:
    - path: tests/fixtures/generation_quality/
      purpose: "Sanitized PRD fixtures for readiness and audit regression tests"
  regression_targets:
    - "A sanitized PRD with buried prose requirements produces ReadinessFinding(severity=blocker)"
    - "A fixture with partial examples triggers required_variants derivation (ExampleKind=illustrative)"
    - "A fixture referencing existing code validates against real InterfaceFact records"
    - "Generated route/handler/config without runtime wiring raises ArchitectureConformanceError"
    - "Generated E2E tests without semantic selectors produce TestQualityFinding(kind=brittle_selector)"
    - "GenerationAuditRecord contains requirement_id, generated_files, generated_tests, audit_status"
