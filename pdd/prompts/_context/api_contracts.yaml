# API Contracts — Single source of truth for all API endpoints
# Generated by Step 8.5 of the architecture workflow (issue #1466)
#
# The 6 generation quality modules (generation_readiness, generation_source_contract,
# interface_grounder, wiring_validator, test_quality_gate, generation_audit) are
# Python library modules with no HTTP REST endpoints. Their public surfaces are
# Python functions documented in data_dictionary.yaml and integration_points.yaml.

endpoints: {}

# --- Python Module Public Surfaces (not HTTP endpoints) ---
# Documented here for cross-module interface grounding.

module_interfaces:
  generation_source_contract:
    filepath: pdd/generation_source_contract.py
    public_functions:
      - name: create_source_contract
        signature: "(run_id: Optional[str] = None, prd_text: Optional[str] = None) -> GenerationSourceContract"
        description: "Create a new GenerationSourceContract with a fresh UUID run_id"

      - name: load_source_contract
        signature: "(run_id: str, base_dir: Path = Path('.pdd/generation-contracts')) -> GenerationSourceContract"
        description: "Load a persisted contract from .pdd/generation-contracts/{run_id}.json"
        errors:
          - FileNotFoundError
          - ValidationError

      - name: save_source_contract
        signature: "(contract: GenerationSourceContract, base_dir: Path = Path('.pdd/generation-contracts')) -> Path"
        description: "Persist contract to .pdd/generation-contracts/{run_id}.json; creates parent dirs"
        side_effects:
          - "Writes JSON to .pdd/generation-contracts/{run_id}.json"

  generation_readiness:
    filepath: pdd/generation_readiness.py
    public_functions:
      - name: analyze_readiness
        signature: "(prd_text: str, contract: GenerationSourceContract) -> GenerationSourceContract"
        description: "Run full readiness analysis; populates features, example_classifications, readiness_findings on contract"
        errors:
          - "ValueError on empty prd_text"

      - name: extract_requirements
        signature: "(prd_text: str) -> List[FeatureRequirement]"
        description: "Extract FeatureRequirement records from PRD text using regex heuristics"

      - name: classify_examples
        signature: "(prd_text: str, features: List[FeatureRequirement]) -> List[ExampleClassification]"
        description: "Classify each feature's examples as illustrative, exhaustive, or unknown"

      - name: detect_vague_phrases
        signature: "(prd_text: str) -> List[ReadinessFinding]"
        description: "Detect prose-only requirements that cannot be mechanically verified; returns warning-severity findings"

  interface_grounder:
    filepath: pdd/interface_grounder.py
    public_functions:
      - name: ground_interfaces
        signature: "(contract: GenerationSourceContract, source_paths: List[Path]) -> GenerationSourceContract"
        description: "Extract InterfaceFact records from source files; populates contract.interface_facts"
        side_effects:
          - "Reads source files from disk; does not write any files"

      - name: extract_python_facts
        signature: "(source_path: Path) -> List[InterfaceFact]"
        description: "AST-parse a Python source file and extract all InterfaceFact records"
        errors:
          - "SyntaxError if file is not valid Python"

      - name: validate_generated_against_facts
        signature: "(generated_code: str, expected_facts: List[InterfaceFact]) -> List[str]"
        description: "Compare generated code against expected InterfaceFact records; returns violation messages (empty = valid)"

  wiring_validator:
    filepath: pdd/wiring_validator.py
    public_functions:
      - name: validate_wiring
        signature: "(contract: GenerationSourceContract, project_root: Path) -> List[WiringCheckResult]"
        description: "Run all 5 wiring checks; raises ArchitectureConformanceError on any p0 failure"
        errors:
          - "ArchitectureConformanceError when any p0 check fails"

      - name: check_handler_registration
        signature: "(generated_files: List[Path], router_file: Path) -> WiringCheckResult"
        description: "Verify generated handlers appear in router/app registration"

      - name: check_route_reachability
        signature: "(generated_files: List[Path], project_root: Path) -> WiringCheckResult"
        description: "Check URL patterns in route declarations match handler paths"

      - name: check_config_declarations
        signature: "(generated_files: List[Path], config_paths: List[Path]) -> WiringCheckResult"
        description: "Ensure required env/config keys from generated modules appear in config files"

      - name: check_module_test_coverage
        signature: "(generated_files: List[Path], tests_dir: Path) -> WiringCheckResult"
        description: "Confirm each generated module has a corresponding tests/test_*.py file"

      - name: check_script_executable
        signature: "(generated_files: List[Path]) -> WiringCheckResult"
        description: "Verify generated scripts have executable bit and a CLI entry point"

  test_quality_gate:
    filepath: pdd/test_quality_gate.py
    public_functions:
      - name: check_test_quality
        signature: "(test_files: List[Path], contract: GenerationSourceContract) -> List[TestQualityFinding]"
        description: "Run all quality checks on test files; returns all findings (empty = all pass)"

      - name: detect_brittle_selectors
        signature: "(test_source: str, file_path: Path) -> List[TestQualityFinding]"
        description: "Detect CSS utility class or XPath selectors in test assertions"

      - name: detect_private_impl_assertions
        signature: "(test_source: str, file_path: Path) -> List[TestQualityFinding]"
        description: "Detect assertions on private/internal attributes or mocks of non-public symbols"

      - name: detect_exact_dynamic_text
        signature: "(test_source: str, file_path: Path) -> List[TestQualityFinding]"
        description: "Detect assertEqual/assert_text calls with exact timestamps, UUIDs, or numeric IDs"

      - name: detect_no_async_polling
        signature: "(test_source: str, file_path: Path) -> List[TestQualityFinding]"
        description: "Detect Playwright/Selenium tests without wait_for or equivalent polling utilities"

  generation_audit:
    filepath: pdd/generation_audit.py
    public_functions:
      - name: emit_audit
        signature: "(contract: GenerationSourceContract, generated_files: List[Path], wiring_results: List[WiringCheckResult], quality_findings: List[TestQualityFinding]) -> GenerationAuditRecord"
        description: "Build and persist GenerationAuditRecord to .pdd/evidence/generation-audit/{run_id}.json"
        side_effects:
          - "Writes JSON to .pdd/evidence/generation-audit/{run_id}.json"

      - name: load_audit
        signature: "(run_id: str, base_dir: Path = Path('.pdd/evidence/generation-audit')) -> GenerationAuditRecord"
        description: "Load a persisted audit record"
        errors:
          - FileNotFoundError
          - ValidationError
          - "jsonschema.ValidationError on schema version mismatch"

      - name: check_audit
        signature: "(audit: GenerationAuditRecord, *, strict: bool = False) -> List[str]"
        description: "Return omission messages; empty list = all requirements covered. Exits non-zero in strict mode when p0 items are skipped without waiver."
